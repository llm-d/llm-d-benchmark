# Python vLLM Baseline - Granite 3.3 2B (throughput)

scenario:
  - name: "ocp-vllm-granite-2b-tp"

    model:
      name: ibm-granite/granite-3.3-2b-instruct
      shortName: granite-3.3-2b
      path: models/ibm-granite/granite-3.3-2b-instruct
      huggingfaceId: ibm-granite/granite-3.3-2b-instruct

    affinity:
      enabled: true
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-H100-80GB-HBM3

    modelservice:
      enabled: false
    standalone:
      enabled: true
      image:
        repository: docker.io/vllm/vllm-openai
        tag: v0.20.2
        pullPolicy: IfNotPresent
      vllm:
        customCommand: |
          vllm serve ibm-granite/granite-3.3-2b-instruct \
            --host 0.0.0.0 \
            --port 8000 \
            --gpu-memory-utilization 0.95 \
            --tensor-parallel-size 1

    fma:
      enabled: false

    vllmCommon:
      priorityClassName: nightly-gpu-critical

    workDir: /tmp/llmdbenchcicdvllm-ocp/

    harness:
      name: vllm-benchmark
      experimentProfile: sanity_random.yaml

    images:
      benchmark:
        repository: ghcr.io/llm-d/llm-d-benchmark
        tag: nightly
