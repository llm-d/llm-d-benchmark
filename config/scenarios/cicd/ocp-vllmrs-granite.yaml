# vllm-rs Benchmark - Granite 3.3 2B (small model)

scenario:
  - name: "ocp-vllmrs-granite-2b"

    model:
      name: ibm-granite/granite-3.3-2b-instruct
      shortName: granite-3.3-2b
      path: models/ibm-granite/granite-3.3-2b-instruct
      huggingfaceId: ibm-granite/granite-3.3-2b-instruct

    affinity:
      enabled: true
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-H100-80GB-HBM3

    modelservice:
      enabled: false
    standalone:
      enabled: true
      image:
        repository: quay.io/starpit/vllmrs
        tag: cuda-sm90-dev-20260514
        pullPolicy: Always
      vllm:
        customCommand: |
          vllm serve ibm-granite/granite-3.3-2b-instruct \
            --host 0.0.0.0 \
            --port 8000 \
            --gpu-memory-utilization 0.95 \
            --tensor-parallel-size 1

    fma:
      enabled: false

    vllmCommon:
      priorityClassName: nightly-gpu-critical

    workDir: /tmp/llmdbench-vllmrs/

    harness:
      name: nop
      experimentProfile: nop.yaml
      executable: llm-d-benchmark.py

    images:
      benchmark:
        repository: ghcr.io/llm-d/llm-d-benchmark
        tag: nightly
