# Optimized Baseline -- Kustomize Deployment
#
# Usage:
#   llmdbenchmark --spec guides/optimized-baseline standup \
#       -t kustomize -p llm-d-optimized-baseline \
#       --llmd-repo-path /path/to/llm-d

scenario:
  - name: "optimized-baseline"

    model:
      name: Qwen/Qwen3-32B
      shortName: qwen-qwen3-32b
      huggingfaceId: Qwen/Qwen3-32B

    namespace:
      name: llm-d-optimized-baseline

    kustomize:
      enabled: true
      guideName: "optimized-baseline"
      repoPath: ""
      repoRef: "main"
      gaieVersion: ""
      acceleratorBackend: "gpu/vllm"
      monitoring: false
      overlayPath: ""
      extraHelmValues: []
      extraHelmSets: {}

      # Inline kustomize strategic merge patches applied on top of the
      # guide's modelserver base.  For gated models, add an HF_TOKEN
      # env var patch (the secret is auto-created from HF_TOKEN env):
      #
      #   - patch: |
      #       apiVersion: apps/v1
      #       kind: Deployment
      #       metadata:
      #         name: decode
      #       spec:
      #         template:
      #           spec:
      #             containers:
      #               - name: modelserver
      #                 env:
      #                   - name: HF_TOKEN
      #                     valueFrom:
      #                       secretKeyRef:
      #                         name: llm-d-hf-token
      #                         key: HF_TOKEN
      patches:
        - patch: |
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: decode
            spec:
              replicas: 2
              template:
                spec:
                  volumes:
                    - name: triton-cache
                      emptyDir: {}
                  containers:
                    - name: modelserver
                      volumeMounts:
                        - mountPath: /.triton
                          name: triton-cache

      extraVariables: {}
      deployTimeout: 900

    standalone:
      enabled: false
    modelservice:
      enabled: false

    harness:
      name: inference-perf
