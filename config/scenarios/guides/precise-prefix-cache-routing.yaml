# ============================================================================
# PRECISE PREFIX CACHE AWARE ROUTING WELL LIT PATH
# Converted from bash environment variables to YAML format
# Based on https://github.com/llm-d/llm-d/tree/main/guides/precise-prefix-cache-aware/README.md
#
# Notes:
# - Removed pod monitoring; can be added using decode.extraContainerConfig
# - Removed extra volumes metrics-volume and torch-compile-volume (not needed for this model/hardware)
# - Use decode.additionalVolumeMounts and decode.additionalVolumes to add them if needed
# ============================================================================

scenario:
  - name: "precise-prefix-cache-routing"

    # =========================================================================
    # KUSTOMIZE DEPLOY METHOD   (scope: the ENTIRE stack)
    # -------------------------------------------------------------------------
    # When kustomize.enabled is true (or `-t kustomize` is passed) this
    # scenario is deployed by applying the UPSTREAM llm-d guide directly
    # (guides/<guideName> in the llm-d repo). In that mode the deployment is
    # defined ENTIRELY by the guide's own manifests:
    #
    #   * EVERYTHING ELSE in this scenario is IGNORED -- model, modelservice,
    #     standalone, decode/prefill, vllmCommon, storage, harness model, etc.
    #   * `-m/--models` and all other CLI/scenario tuning are ignored.
    #   * DoE `experiment` SETUP sweeps do NOT alter a kustomize deploy
    #     (only run/workload treatments still apply).
    #
    # The ONLY way to modify a kustomize deployment is the kustomize.* keys
    # below:
    #   patches / overlayPath           -> modelserver (the workload pods)
    #   extraHelmValues / extraHelmSets -> router / GAIE helm release
    #   guideVariableOverrides          -> override the guide README's ${VAR}
    # See docs/kustomize.md for the full reference and worked examples.
    #
    # NOT SUPPORTED with kustomize: multi-model / multi-stack scenarios
    # (the deploy is keyed on guideName with no per-stack uniquification --
    # stacks would collide). Use the modelservice method for multi-model.
    #
    # When kustomize.enabled is false (the DEFAULT) this whole block is
    # inert and the scenario deploys via modelservice/standalone as
    # configured further below.
    # =========================================================================
    kustomize:
      enabled: false

      guideName: "precise-prefix-cache-routing"
      repoPath: ""
      repoRef: "main"
      gaieVersion: ""
      acceleratorBackend: "gpu/vllm"
      monitoring: false
      overlayPath: ""
      extraHelmValues: []
      extraHelmSets: {}
      guideVariableOverrides: {}   # override/fill the guide README's ${VAR}

      # Inline kustomize strategic merge patches applied on top of the
      # guide's modelserver base.  For gated models, add an HF_TOKEN
      # env var patch (the secret is auto-created from HF_TOKEN env):
      patches:
         - patch: |
             apiVersion: apps/v1
             kind: Deployment
             metadata:
               name: decode
             spec:
               template:
                 spec:
                   containers:
                     - name: modelserver
                       env:
                         - name: HF_TOKEN
                           valueFrom:
                             secretKeyRef:
                               name: llm-d-hf-token
                               key: HF_TOKEN
      #patches:
      #  - patch: |
      #      apiVersion: apps/v1
      #      kind: Deployment
      #      metadata:
      #        name: decode
      #      spec:
      #        replicas: 2
      #        template:
      #          spec:
      #            priorityClassName: nightly-gpu-critical
      
    # =========================================================================
    # COMMON -- Applies to all deployment methods
    # =========================================================================

    # -------------------------------------------------------------------------
    # Model Configuration
    # -------------------------------------------------------------------------
    model:
      name: Qwen/Qwen3-32B
      shortName: qwen-qwen3-32b
      path: models/Qwen/Qwen3-32B
      huggingfaceId: Qwen/Qwen3-32B
      size: 1Ti
      maxModelLen: 16000
      blockSize: 64
      gpuMemoryUtilization: 0.95

    # =========================================================================
    # DEPLOYMENT METHOD -- Choose standalone or modelservice
    # =========================================================================
    modelservice:
      enabled: true

    standalone:
      enabled: false

    kustomize:
      enabled: false

#    namespace:
#      name: llm-d-precise-prefix-cache-aware

    # =======================================================================================
    # KUSTOMIZE -- Install directly from main llm-d repo "guides/<scenario name>" directory
    # =======================================================================================

      guideName: "precise-prefix-cache-aware"
      repoPath: ""
      repoRef: "main"
      gaieVersion: ""
      acceleratorBackend: "gpu/vllm"
      monitoring: false
      overlayPath: ""
      extraHelmValues: []
      extraHelmSets: {}

      # Inline kustomize strategic merge patches applied on top of the
      # guide's modelserver base.  For gated models, add an HF_TOKEN
      # env var patch (the secret is auto-created from HF_TOKEN env):
      #
      #   - patch: |
      #       apiVersion: apps/v1
      #       kind: Deployment
      #       metadata:
      #         name: decode
      #       spec:
      #         template:
      #           spec:
      #             containers:
      #               - name: modelserver
      #                 env:
      #                   - name: HF_TOKEN
      #                     valueFrom:
      #                       secretKeyRef:
      #                         name: llm-d-hf-token
      #                         key: HF_TOKEN
      patches:
        - patch: |
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: decode
            spec:
              replicas: 2
              template:
                spec:
                  volumes:
                    - name: triton-cache
                      emptyDir: {}
                  containers:
                    - name: modelserver
                      volumeMounts:
                        - mountPath: /.triton
                          name: triton-cache

    # =========================================================================
    # MODELSERVICE -- Only applies when modelservice.enabled: true
    # The following sections configure the llm-d modelservice Helm chart
    # deployment including decode pods, prefill pods, routing, and GAIE.
    # =========================================================================

    # -------------------------------------------------------------------------
    # Routing Configuration
    # -------------------------------------------------------------------------
    routing:
      proxy:
        enabled: false

    # -------------------------------------------------------------------------
    # Routing / GAIE Configuration
    # `sidecar.enabled: true` is mapped to the
    # `router.tokenizer.enabled: true` knob shipped by the
    # llm-d-router-{standalone,gateway}-dev charts; the chart owns the
    # UDS tokenizer container, sockets, and volumes -- the legacy
    # post-renderer hack is no longer needed.
    # -------------------------------------------------------------------------
    inferenceExtension:
      pluginsConfigFile: "precise-prefix-cache-config.yaml"
      sidecar:
        enabled: true
      flags:
        v: 4  # log verbosity
      pluginsCustomConfig:
        precise-prefix-cache-config.yaml: |
          apiVersion: llm-d.ai/v1alpha1
          kind: EndpointPickerConfig
          plugins:
            - type: tokenizer
              parameters:
                modelName: Qwen/Qwen3-32B
                udsTokenizerConfig:
                  socketFile: /tmp/tokenizer/tokenizer-uds.socket
            - type: endpoint-notification-source
            - type: metrics-data-source
            - type: core-metrics-extractor
            - type: single-profile-handler
            - type: decode-filter
            - type: precise-prefix-cache-scorer
              parameters:
                tokenProcessorConfig:
                  blockSize: 64           # must match vLLM --block-size
                speculativeIndexing: true
                indexerConfig:
                  tokenizersPoolConfig:
                    modelName: ${model.name}
                    workersCount: 24
                    uds:
                      socketFile: /tmp/tokenizer/tokenizer-uds.socket
                  kvBlockIndexConfig:
                    enableMetrics: true
                kvEventsConfig:
                  topicFilter: "kv@"
                  concurrency: 8
                  discoverPods: true
                  podDiscoveryConfig:
                    socketPort: 5556
            - type: kv-cache-utilization-scorer
            - type: queue-scorer
            - type: no-hit-lru-scorer
            - type: max-score-picker
          dataLayer:
            sources:
              - pluginRef: metrics-data-source
                extractors:
                  - pluginRef: core-metrics-extractor
              - pluginRef: endpoint-notification-source
                extractors:
                  - pluginRef: precise-prefix-cache-scorer
          schedulingProfiles:
            - name: default
              plugins:
                - pluginRef: decode-filter
                - pluginRef: kv-cache-utilization-scorer
                  weight: 2.0
                - pluginRef: queue-scorer
                  weight: 2.0
                - pluginRef: precise-prefix-cache-scorer
                  weight: 3.0
                - pluginRef: no-hit-lru-scorer
                  weight: 2.0
                - pluginRef: max-score-picker

      # InferencePool Provider Configuration
      inferencePoolProviderConfig:
        destinationRule:
          # host is auto-resolved from model_id_label (e.g. {model_id_label}-router-epp)
          trafficPolicy:
            connectionPool:
              http:
                http1MaxPendingRequests: 256000
                maxRequestsPerConnection: 256000
                http2MaxRequests: 256000
                idleTimeout: "900s"
              tcp:
                maxConnections: 256000
                maxConnectionDuration: "1800s"
                connectTimeout: "900s"

    # -------------------------------------------------------------------------
    # Affinity / Node Selection
    # By default, affinity is disabled and pods schedule on any available node.
    # Options:
    #   1. Leave commented out -- no node selection constraint
    #   2. Set nodeSelector to "auto" -- auto-detects GPU labels from the cluster
    #   3. Set explicit labels -- pods only schedule on matching nodes
    # -------------------------------------------------------------------------
    # affinity:
    #   enabled: true
    #   nodeSelector:
    #     nvidia.com/gpu.product: NVIDIA-H100-80GB-HBM3      # OpenShift
    #     # gpu.nvidia.com/model: H200                        # Kubernetes
    #     # cloud.google.com/gke-accelerator: nvidia-h100-80gb  # GKE

    # -------------------------------------------------------------------------
    # Prefill Configuration
    # -------------------------------------------------------------------------
    prefill:
      enabled: false
      replicas: 0

    # -------------------------------------------------------------------------
    # Decode Configuration
    # -------------------------------------------------------------------------
    decode:
      replicas: 2
      vllm:
        customCommand: |
          export LD_LIBRARY_PATH=$(find / -name libcuda.so.1 -printf '%h\n' 2>/dev/null | sed ':a; N; $!ba; s/\n/:/g'):${LD_LIBRARY_PATH}
          export LIBRARY_PATH=$(find / -name libcuda.so.1 -printf '%h\n' 2>/dev/null | head -1):${LIBRARY_PATH}
          . /shared-config/llmdbench_env.sh
          vllm serve /model-cache/$MODEL_PATH \
          --host 0.0.0.0 \
          --served-model-name $MODEL_NAME \
          --port $VLLM_INFERENCE_PORT \
          --block-size $VLLM_BLOCK_SIZE \
          --max-model-len $VLLM_MAX_MODEL_LEN \
          --max-num-seq $VLLM_MAX_NUM_SEQ \
          --max-num-batched-tokens $VLLM_MAX_NUM_BATCHED_TOKENS \
          --tensor-parallel-size $TP_SIZE \
          --gpu-memory-utilization $VLLM_ACCELERATOR_MEM_UTIL \
          --prefix-caching-hash-algo sha256_cbor \
          --kv-events-config '{"enable_kv_cache_events":true, "publisher":"zmq", "endpoint":"$(KV_EVENTS_ENDPOINT)", "topic":"kv@$(POD_IP):$(POD_PORT)@$(MODEL_NAME)"}' \
          --disable-uvicorn-access-log \
          --disable-access-log-for-endpoints=/health,/metrics,/v1/models

      initContainers:
        - name: preprocess
          imageKey: benchmark
          imagePullPolicy: Always
          command: ["set_llmdbench_environment.py", "-e", "/shared-config/llmdbench_env.sh", "-i"]
          volumeMounts:
            - name: shared-config
              mountPath: /shared-config

      parallelism:
        tensor: 2
        data: 1
        dataLocal: 1
        workers: 1

      # Resource configuration
      resources:
        limits:
          memory: 64Gi
          cpu: "16"
        requests:
          memory: 64Gi
          cpu: "16"

      extraEnvVars:
        - name: KV_EVENTS_ENDPOINT
          value: "tcp://*:5556"
        - name: DO_NOT_TRACK
          value: "1"

      # -----------------------------------------------------------------------
      # Extra Container Configuration
      # Corresponds to: LLMDBENCH_VLLM_COMMON_EXTRA_CONTAINER_CONFIG
      # -----------------------------------------------------------------------
      extraContainerConfig:
        ports:
          - containerPort: 5557  # NIXL side channel port
            protocol: TCP
          - containerPort: 8200  # Metrics port
            name: metrics
            protocol: TCP
        securityContext:
          capabilities:
            add:
              - "IPC_LOCK"
              - "SYS_RAWIO"
              - "NET_ADMIN"
              - "NET_RAW"
          runAsGroup: 0
          runAsUser: 0
        imagePullPolicy: Always

      # -----------------------------------------------------------------------
      # Additional Volume Mounts
      # Corresponds to: LLMDBENCH_VLLM_MODELSERVICE_DECODE_EXTRA_VOLUME_MOUNTS
      # -----------------------------------------------------------------------
      additionalVolumeMounts: []

      # -----------------------------------------------------------------------
      # Additional Volumes
      # Corresponds to: LLMDBENCH_VLLM_MODELSERVICE_DECODE_EXTRA_VOLUMES
      # -----------------------------------------------------------------------
      additionalVolumes: []

    # =========================================================================
    # COMMON -- Applies to all deployment methods (continued)
    # =========================================================================

    annotations:
      prefill:
        pod:
#          k8s.v1.cni.cncf.io/networks: multi-nic-inference
      decode:
        pod:
#          k8s.v1.cni.cncf.io/networks: multi-nic-inference

      resources:
        prefill:
#          networkResource: "rdma/roce_gdr"
#          networkNr: 1
        decode:
#          networkResource: "rdma/roce_gdr"
#          networkNr: 1

    vllmCommon:
#      priorityClassName: nightly-gpu-critical

      volumes:
        - name: shared-config
          type: emptyDir
          emptyDir: {}
        - name: dshm
          type: emptyDir
          emptyDir:
            medium: Memory
            sizeLimit: 20Gi

      volumeMounts:
        - name: shared-config
          mountPath: /shared-config
        - name: dshm
          mountPath: /dev/shm

    # -------------------------------------------------------------------------
    # Storage Configuration
    # -------------------------------------------------------------------------
    storage:
      modelPvc:
        size: 1Ti
        # Uncomment to specify storage class:
        # storageClassName: standard-rwx
        # storageClassName: shared-vast
        # storageClassName: ocs-storagecluster-cephfs

    # =========================================================================
    # WORKLOAD / HARNESS -- Benchmark execution configuration
    # =========================================================================

    # -------------------------------------------------------------------------
    # Workload/Harness Configuration
    # -------------------------------------------------------------------------
    workDir: "~/data/precise_prefix_cache_aware"

    harness:
      name: inference-perf
      experimentProfile: shared_prefix_synthetic.yaml
