# AGENTIC-TESTS WELL LIT PATH
# Reasoning + tool-call deployment driven by OTel-trace replay.

scenario:
  # ============================================================================
  # Agentic tests: Qwen3-30B-A3B-Thinking with tool call support
  # ============================================================================
  - name: "agentic-tests"

    # =========================================================================
    # COMMON -- Applies to all deployment methods
    # =========================================================================

    # -------------------------------------------------------------------------
    # Model Configuration
    # Corresponds to: LLMDBENCH_DEPLOY_MODEL_LIST="Qwen/Qwen3-30B-A3B-Thinking-2507"
    # Alternative models (commented out in original):
    #   - Qwen/Qwen3-0.6B
    #   - facebook/opt-125m
    #   - meta-llama/Llama-3.1-70B-Instruct
    #   - deepseek-ai/DeepSeek-R1-0528
    # -------------------------------------------------------------------------
    model:
      name: Qwen/Qwen3-30B-A3B-Thinking-2507
      shortName: qwen-qwen3-30b-a3b-thinking-2507
      path: models/Qwen/Qwen3-30B-A3B-Thinking-2507
      huggingfaceId: Qwen/Qwen3-30B-A3B-Thinking-2507
      size: 1Ti
      maxModelLen: 262144
      blockSize: 64
      gpuMemoryUtilization: 0.95
      cacheBase: /model-cache

    # -------------------------------------------------------------------------
    # Affinity / Node Selection
    # By default, affinity is disabled and pods schedule on any available node.
    # Options:
    #   1. Leave commented out -- no node selection constraint
    #   2. Set nodeSelector to "auto" -- auto-detects GPU labels from the cluster
    #   3. Set explicit labels -- pods only schedule on matching nodes
    # -------------------------------------------------------------------------
    # affinity:
    #   enabled: true
    #   nodeSelector:
    #     nvidia.com/gpu.product: NVIDIA-H100-80GB-HBM3      # OpenShift
    #     # gpu.nvidia.com/model: H200                        # Kubernetes
    #     # cloud.google.com/gke-accelerator: nvidia-h100-80gb  # GKE

    # =========================================================================
    # DEPLOYMENT METHOD -- Choose standalone or modelservice
    # =========================================================================
    modelservice:
      enabled: true

    standalone:
      enabled: false

    # =========================================================================
    # MODELSERVICE -- Only applies when modelservice.enabled: true (continued)
    # The following sections configure routing, GAIE, prefill, and decode.
    # =========================================================================

    # -------------------------------------------------------------------------
    # Routing / GAIE Configuration
    #
    # NOTE: This will include the "program-aware-plugin" when merged
    # -------------------------------------------------------------------------
    router:
      epp:
        pluginsConfigFile: "default-plugins.yaml"

    # =========================================================================
    # COMMON -- Applies to all deployment methods (continued)
    # =========================================================================

    # -------------------------------------------------------------------------
    # Storage Configuration
    # -------------------------------------------------------------------------
    storage:
      modelPvc:
        size: 1Ti
        # Uncomment to specify storage class:
        # storageClassName: standard-rwx
        # storageClassName: shared-vast
        # storageClassName: ocs-storagecluster-cephfs

    # =========================================================================
    # MODELSERVICE -- Only applies when modelservice.enabled: true (continued)
    # =========================================================================

    # -------------------------------------------------------------------------
    # Prefill Configuration
    # -------------------------------------------------------------------------
    prefill:
      enabled: false
      replicas: 0

    # -------------------------------------------------------------------------
    # Decode Configuration
    # -------------------------------------------------------------------------
    decode:
      replicas: 2
      vllm:
        customCommand: |
          export LD_LIBRARY_PATH=$(find / -name libcuda.so.1 -printf '%h\n' 2>/dev/null | sed ':a; N; $!ba; s/\n/:/g'):${LD_LIBRARY_PATH}
          export LIBRARY_PATH=$(find / -name libcuda.so.1 -printf '%h\n' 2>/dev/null | head -1):${LIBRARY_PATH}
          vllm serve /model-cache/$MODEL_PATH \
          --host 0.0.0.0 \
          --served-model-name $MODEL_NAME \
          --port $VLLM_METRICS_PORT \
          --block-size $VLLM_BLOCK_SIZE \
          --max-model-len $VLLM_MAX_MODEL_LEN \
          --max-num-seq $VLLM_MAX_NUM_SEQ \
          --max-num-batched-tokens $VLLM_MAX_NUM_BATCHED_TOKENS \
          --tensor-parallel-size $TP_SIZE \
          --gpu-memory-utilization $VLLM_ACCELERATOR_MEM_UTIL \
          --no-enable-log-requests \
          --reasoning-parser qwen3 \
          --enable-auto-tool-choice \
          --tool-call-parser qwen3_xml \
          --disable-uvicorn-access-log \
          --disable-access-log-for-endpoints=/health,/metrics,/v1/models \
          --override-generation-config '{"temperature": 0, "top_p": 1.0, "top_k": -1, "seed": 42}' \
          --no-enable-prefix-caching

      initContainers:
        - name: preprocess
          imageKey: benchmark
          imagePullPolicy: Always
          command: ["set_llmdbench_environment.py", "-e", "/shared-config/llmdbench_env.sh", "-i"]
          volumeMounts:
            - name: shared-config
              mountPath: /shared-config

      parallelism:
        tensor: 2
        data: 1
        dataLocal: 1
        workers: 1

      # Resource configuration
      resources:
        limits:
          memory: 256Gi
          cpu: "16"
        requests:
          memory: 128Gi
          cpu: "16"

      # -----------------------------------------------------------------------
      # Extra Environment Variables
      # Only PYTHONHASHSEED and LMCACHE_MAX_LOCAL_CPU_SIZE are explicitly set;
      # other vars (UCX_TLS, VLLM_NIXL_*, etc.) are auto-populated by the
      # preprocess script at pod runtime.
      # -----------------------------------------------------------------------
      extraEnvVars: []

      # -----------------------------------------------------------------------
      # Extra Container Configuration
      # Corresponds to: LLMDBENCH_VLLM_COMMON_EXTRA_CONTAINER_CONFIG
      # -----------------------------------------------------------------------
      extraContainerConfig:
        ports:
          - containerPort: 5557  # NIXL side channel port
            protocol: TCP
          - containerPort: 8200  # Metrics port
            name: metrics
            protocol: TCP
        securityContext:
          capabilities:
            add:
              - "IPC_LOCK"
              - "SYS_RAWIO"
          runAsGroup: 0
          runAsUser: 0
        imagePullPolicy: Always

      # -----------------------------------------------------------------------
      # Additional Volume Mounts
      # Corresponds to: LLMDBENCH_VLLM_MODELSERVICE_DECODE_EXTRA_VOLUME_MOUNTS
      # -----------------------------------------------------------------------
      additionalVolumeMounts: []

      # -----------------------------------------------------------------------
      # Additional Volumes
      # Corresponds to: LLMDBENCH_VLLM_MODELSERVICE_DECODE_EXTRA_VOLUMES
      # -----------------------------------------------------------------------
      additionalVolumes: []

      # -----------------------------------------------------------------------
      # Multi-NIC Configuration (uncomment to enable)
      # Corresponds to: LLMDBENCH_VLLM_MODELSERVICE_DECODE_PODANNOTATIONS
      # -----------------------------------------------------------------------
      # To enable multi-nic, add to annotations.decode.pod:
      # annotations:
      #   decode:
      #     pod:
      #       k8s.v1.cni.cncf.io/networks: multi-nic-compute

      # -----------------------------------------------------------------------
      # ROCE/GDR Configuration (uncomment to enable)
      # Corresponds to: LLMDBENCH_VLLM_MODELSERVICE_DECODE_NETWORK_RESOURCE
      #                 LLMDBENCH_VLLM_MODELSERVICE_DECODE_NETWORK_NR
      # -----------------------------------------------------------------------
      # To enable roce/gdr, add to resources:
      # resources:
      #   limits:
      #     rdma/roce_gdr: "16"
      #   requests:
      #     rdma/roce_gdr: "16"

    # =========================================================================
    # COMMON -- Applies to all deployment methods (continued)
    # =========================================================================

    vllmCommon:

      volumes:
        - name: shared-config
          type: emptyDir
          emptyDir: {}
        - name: dshm
          type: emptyDir
          emptyDir:
            medium: Memory
            # Corresponds to: LLMDBENCH_VLLM_COMMON_SHM_MEM (using default 16Gi)
            sizeLimit: 16Gi

      # Corresponds to: LLMDBENCH_VLLM_MODELSERVICE_DECODE_EXTRA_VOLUME_MOUNTS
      volumeMounts:
        - name: shared-config
          mountPath: /shared-config
        - name: dshm
          mountPath: /dev/shm

    # -------------------------------------------------------------------------
    # Custom Image Configuration (optional)
    # Corresponds to commented out LLMDBENCH_LLMD_IMAGE_* variables
    # -------------------------------------------------------------------------
    # Uncomment to use lmcache image:
    # images:
    #   vllm:
    #     repository: docker.io/lmcache/vllm-openai
    #     tag: v0.3.7

    # =========================================================================
    # WORKLOAD / HARNESS -- Benchmark execution configuration
    # =========================================================================
    workDir: "~/data/agentic-tests"

    harness:
      name: inference-perf
      experimentProfile: otel_traces.yaml

    experiment:
      datasetDir: /workspace/inference-perf/examples/otel/test_traces/advanced/
