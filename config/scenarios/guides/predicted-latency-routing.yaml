# PREDICTED LATENCY BASED SCHEDULING WELL LIT PATH for LLM-D Deployment
# Migrated from bash environment variables to YAML format
# Based on https://github.com/llm-d/llm-d/tree/main/guides/predicted-latency-based-scheduling
#
# Notes:
# - Removed pod monitoring; can be added using decode.extraContainerConfig
# - Removed extra volumes metrics-volume and torch-compile-volume (not needed for this model/hardware)
# - Use decode.additionalVolumeMounts and decode.additionalVolumes to add them if needed

scenario:
  # ============================================================================
  # Predicted Latency Based Scheduling - Qwen3-32B with 2 decode pods
  # ============================================================================
  - name: "predicted-latency-routing"

    # =========================================================================
    # KUSTOMIZE DEPLOY METHOD   (scope: the ENTIRE stack)
    # -------------------------------------------------------------------------
    # When kustomize.enabled is true (or `-t kustomize` is passed) this
    # scenario is deployed by applying the UPSTREAM llm-d guide directly
    # (guides/<guideName> in the llm-d repo). In that mode the deployment is
    # defined ENTIRELY by the guide's own manifests:
    #
    #   * EVERYTHING ELSE in this scenario is IGNORED -- model, modelservice,
    #     standalone, decode/prefill, vllmCommon, storage, harness model, etc.
    #   * `-m/--models` and all other CLI/scenario tuning are ignored.
    #   * DoE `experiment` SETUP sweeps do NOT alter a kustomize deploy
    #     (only run/workload treatments still apply).
    #
    # The ONLY way to modify a kustomize deployment is the kustomize.* keys
    # below:
    #   patches / overlayPath           -> modelserver (the workload pods)
    #   extraHelmValues / extraHelmSets -> router / GAIE helm release
    #   guideVariableOverrides          -> override the guide README's ${VAR}
    # See docs/kustomize.md for the full reference and worked examples.
    #
    # NOT SUPPORTED with kustomize: multi-model / multi-stack scenarios
    # (the deploy is keyed on guideName with no per-stack uniquification --
    # stacks would collide). Use the modelservice method for multi-model.
    #
    # When kustomize.enabled is false (the DEFAULT) this whole block is
    # inert and the scenario deploys via modelservice/standalone as
    # configured further below.
    # =========================================================================
    kustomize:
      enabled: false

      guideName: "predicted-latency-routing"
      repoPath: ""
      repoRef: "main"
      gaieVersion: ""
      acceleratorBackend: "gpu/vllm"
      monitoring: false
      overlayPath: ""
      extraHelmValues: []
      extraHelmSets: {}
      guideVariableOverrides: {}   # override/fill the guide README's ${VAR}

      # Inline kustomize strategic merge patches applied on top of the
      # guide's modelserver base.  For gated models, add an HF_TOKEN
      # env var patch (the secret is auto-created from HF_TOKEN env):
      # Default is empty -- upstream guide already injects HF_TOKEN from
      # the `llm-d-hf-token` Secret (auto-created by standup). Add entries
      # here only for non-token overrides (e.g. bump replicas, pin a
      # priorityClassName) -- see optimized-baseline.yaml for an example.
      patches: []

    # =========================================================================
    # COMMON -- Applies to all deployment methods
    # =========================================================================

    # -------------------------------------------------------------------------
    # Model Configuration
    # -------------------------------------------------------------------------
    model:
      name: Qwen/Qwen3-32B
      shortName: qwen-qwen3-32b
      path: models/Qwen/Qwen3-32B
      huggingfaceId: Qwen/Qwen3-32B
      size: 1Ti
      maxModelLen: 16000
      blockSize: 64
      gpuMemoryUtilization: 0.95

    # -------------------------------------------------------------------------
    # Routing Configuration
    # -------------------------------------------------------------------------
    # Note: inferenceModel is enabled via the modelservice chart when this
    # scenario is deployed. The routing is handled through the gaie values.

    # -------------------------------------------------------------------------
    # Affinity / Node Selection
    # By default, affinity is disabled and pods schedule on any available node.
    # Options:
    #   1. Leave commented out -- no node selection constraint
    #   2. Set nodeSelector to "auto" -- auto-detects GPU labels from the cluster
    #   3. Set explicit labels -- pods only schedule on matching nodes
    # -------------------------------------------------------------------------
    # affinity:
    #   enabled: true
    #   nodeSelector:
    #     nvidia.com/gpu.product: NVIDIA-H100-80GB-HBM3      # OpenShift
    #     # gpu.nvidia.com/model: H200                        # Kubernetes
    #     # cloud.google.com/gke-accelerator: nvidia-h100-80gb  # GKE

    # =========================================================================
    # DEPLOYMENT METHOD -- Choose standalone or modelservice
    # =========================================================================
    modelservice:
      enabled: true

    standalone:
      enabled: false

    gateway:
      className: epponly

    # =========================================================================
    # MODELSERVICE -- Only applies when modelservice.enabled: true
    # The following sections configure the llm-d modelservice Helm chart
    # deployment including decode pods, prefill pods, routing, and GAIE.
    # =========================================================================

    # -------------------------------------------------------------------------
    # Routing / GAIE Configuration
    # -------------------------------------------------------------------------
    router:
      latencyPredictor:
        enabled: true
      extraServicePorts:
        - name: http
          port: 80
          protocol: TCP
          targetPort: 8081
      epp:
        replicas: 1
        flags:
          v: 2
        pluginsConfigFile: "predicted-latency-plugins.yaml"
        pluginsCustomConfig:
          predicted-latency-plugins.yaml: |
            apiVersion: llm-d.ai/v1alpha1
            kind: EndpointPickerConfig
            plugins:
            - type: approx-prefix-cache-producer
              parameters:
                # Sized for the 256K-context TPU agentic case (Qwen3-Coder-480B): matching longer
                # prefixes raises the cache-hit rate on long, shared agentic prompts. Tradeoff: it
                # increases per-request prefix-matching work and EPP memory/CPU, most noticeably at
                # high concurrency with very long contexts. For shorter-context GPU/default
                # workloads a smaller value (e.g. 131072, or the chart default) is cheaper and
                # sufficient — lower it to match your max prompt length.
                maxPrefixTokensToMatch: 262144
            - type: predicted-latency-producer
            - type: prefix-cache-affinity-filter
              name: loose-affinity-filter
              parameters:
                affinityThreshold: 0.8
            - type: latency-scorer
            - type: weighted-random-picker
            schedulingProfiles:
            - name: default
              plugins:
              - pluginRef: predicted-latency-producer
              - pluginRef: loose-affinity-filter
              - pluginRef: latency-scorer
              - pluginRef: weighted-random-picker
        resources:
          requests:
            cpu: "4"
            memory: 8Gi
          limits:
            memory: 16Gi
      proxy:
        # CLI args for the Envoy sidecar. Override the chart's defaults of
        # `--log-level trace` (very expensive under load) and no `--concurrency`
        # (Envoy spawns ~hardware_concurrency() worker threads, oversubscribing
        # the cgroup's CPU slice). `--concurrency 8` matches the resources.limits
        # equivalent below; trace-level logging would burn a meaningful share of
        # the sidecar's CPU at high QPS.
        args:
          - "--service-node"
          - "envoy-sidecar"
          - "--log-level"
          - "warn"
          - "--concurrency"
          - "8"
          - "--drain-strategy"
          - "immediate"
          - "--drain-time-s"
          - "60"
          - "-c"
          - "/etc/envoy/envoy.yaml"
        # Resource requests and limits for the Envoy sidecar.
        resources:
          requests:
            cpu: "4"
            memory: 8Gi
          limits:
            memory: 16Gi
      inferencePool:
        failureMode: "FailOpen"
        providerConfig:
          destinationRule:
            trafficPolicy:
              connectionPool:
                http:
                  http1MaxPendingRequests: 256000
                  maxRequestsPerConnection: 256000
                  http2MaxRequests: 256000
                  idleTimeout: "900s"
                tcp:
                  maxConnections: 256000
                  maxConnectionDuration: "1800s"
                  connectTimeout: "900s"
      modelServers:
        protocol: http
        matchLabels:
          llm-d.ai/guide: "predicted-latency-routing"
      tracing:
        otelExporterEndpoint: "http://localhost:4317"
        sampling:
          sampler: "parentbased_traceidratio"
          samplerArg: "0.1"
    # -------------------------------------------------------------------------
    # Prefill Configuration
    # -------------------------------------------------------------------------
    prefill:
      enabled: false
      replicas: 0

    # -------------------------------------------------------------------------
    # Decode Configuration
    # -------------------------------------------------------------------------
    decode:
      replicas: 2
      vllm:
        customCommand: |
          export LD_LIBRARY_PATH=$(find / -name libcuda.so.1 -printf '%h\n' 2>/dev/null | sed ':a; N; $!ba; s/\n/:/g'):${LD_LIBRARY_PATH}
          export LIBRARY_PATH=$(find / -name libcuda.so.1 -printf '%h\n' 2>/dev/null | head -1):${LIBRARY_PATH}
          vllm serve /model-cache/$MODEL_PATH \
          --host 0.0.0.0 \
          --served-model-name $MODEL_NAME \
          --port $VLLM_METRICS_PORT \
          --block-size $VLLM_BLOCK_SIZE \
          --max-model-len $VLLM_MAX_MODEL_LEN \
          --max-num-seq $VLLM_MAX_NUM_SEQ \
          --max-num-batched-tokens $VLLM_MAX_NUM_BATCHED_TOKENS \
          --tensor-parallel-size $TP_SIZE \
          --gpu-memory-utilization $VLLM_ACCELERATOR_MEM_UTIL \
          --no-enable-log-requests \
          --disable-uvicorn-access-log \
          --disable-access-log-for-endpoints=/health,/metrics,/v1/models \
          --no-enable-prefix-caching

      initContainers:
        - name: preprocess
          imageKey: benchmark
          imagePullPolicy: Always
          command: ["set_llmdbench_environment.py", "-e", "/shared-config/llmdbench_env.sh", "-i"]
          volumeMounts:
            - name: shared-config
              mountPath: /shared-config

      parallelism:
        tensor: 1
        data: 1
        dataLocal: 1
        workers: 1

      # Resource configuration
      resources:
        limits:
          memory: 64Gi
          cpu: "16"
        requests:
          memory: 64Gi
          cpu: "16"

      # No customCommand -- the vLLM serve command is auto-generated
      # from model.*, vllmCommon.flags.*, and decode.vllm.additionalFlags.
      # -----------------------------------------------------------------------
      # Extra Environment Variables
      # No custom env vars for this scenario -- uses default ENVVARS_TO_YAML
      # mechanism. Auto-populated vars (UCX_TLS, VLLM_NIXL_*, etc.) are set
      # by the preprocess script at pod runtime.
      # -----------------------------------------------------------------------
      extraEnvVars: []

      # -----------------------------------------------------------------------
      # Extra Container Configuration
      # -----------------------------------------------------------------------
      extraContainerConfig:
        ports:
          - containerPort: 5557  # NIXL side channel port
            protocol: TCP
          - containerPort: 8200  # Metrics port
            name: metrics
            protocol: TCP
        securityContext:
          capabilities:
            add:
              - "IPC_LOCK"
              - "SYS_RAWIO"
          runAsGroup: 0
          runAsUser: 0
        imagePullPolicy: Always

      # -----------------------------------------------------------------------
      # Additional Volume Mounts
      # -----------------------------------------------------------------------
      additionalVolumeMounts: []

      # -----------------------------------------------------------------------
      # Additional Volumes
      # -----------------------------------------------------------------------
      additionalVolumes: []

    # =========================================================================
    # COMMON -- Applies to all deployment methods (continued)
    # =========================================================================
    vllmCommon:
#      priorityClassName: nightly-gpu-critical

      volumes:
        - name: shared-config
          type: emptyDir
          emptyDir: {}
        - name: dshm
          type: emptyDir
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi

      volumeMounts:
        - name: dshm
          mountPath: /dev/shm
        - name: shared-config
          mountPath: /shared-config

    # -------------------------------------------------------------------------
    # Storage Configuration
    # -------------------------------------------------------------------------
    storage:
      modelPvc:
        size: 1Ti

    # =========================================================================
    # WORKLOAD / HARNESS -- Benchmark execution configuration
    # =========================================================================

    # -------------------------------------------------------------------------
    # Workload/Harness Configuration
    # -------------------------------------------------------------------------
    workDir: "~/data/optimized-baseline"

    harness:
      name: inference-perf
      experimentProfile: shared_prefix_synthetic.yaml
