# WORKLOAD AUTOSCALING (WVA with FMA) WELL LIT PATH for LLM-D Deployment
#
# Same base configuration as `inference-scheduling.yaml` (Qwen3-32B, 2 decode
# pods, modelservice deployment) but with the Workload Variant Autoscaler
# (WVA) explicitly enabled. All HPA / VariantAutoscaling knobs are listed
# below even when they match defaults.yaml, so users can see the full
# surface area in one place and tweak it per-scenario.
#
# WVA scales an FMA-served model deployment. Topology:
#
#   modelservice (decode.replicas: 0) provides gateway / EPP / InferencePool
#     / PodMonitor; its decode Deployment is disabled — FMA owns the
#     elastic vLLM tier instead.
#
#   FMA (fma.enabled: true)           launcher pods host vLLM and serve
#     inference traffic; the requester Deployment holds the GPU lease
#     that FMA scales.
#
#   WVA (wva.enabled: true)           scales the FMA requester Deployment;
#     FMA's launcher-populator reconciles launcher pods to match.
#
# How EPP reaches FMA: 12_router-values.yaml.j2 emits a router.modelServers
# selector matching `llm-d.ai/inferenceServing=true, llm-d.ai/model=<id>`.
# 24_fma-deployment.yaml.j2 puts those labels on the InferenceServerConfig's
# `modelServerConfig.labels` (NOT on the LauncherConfig pod template) — the
# dual-pods controller propagates them to the launcher pod at BIND time, so
# only launchers actually serving traffic show up in the InferencePool.
#
# How WVA tracks FMA: launcher pods carry `llm-d.ai/variant=<id>-fma` (also
# applied at bind time via the ISC; label-based variant identification per
# WVA repo PR #1145). Templates 27/28 retarget the VariantAutoscaling + HPA
# at the FMA requester Deployment (`fma-requester-<id>`) when fma.enabled.
#
# Based on:
#   https://github.com/llm-d/llm-d/blob/main/guides/workload-autoscaling/README.wva.md
#
# Running:
#
#   llmdbenchmark --spec guides/workload-autoscaling standup -p <namespace>
#
# The `-u/--wva` CLI flag is NOT required with this scenario because
# `wva.enabled: true` is already hard-coded below. Pass `-u` with the
# plain `inference-scheduling` scenario if you want to toggle WVA on
# without editing YAML.

scenario:
  # ============================================================================
  #Inference Scheduling + WVA - Qwen3-32B served by FMA, autoscaled by WVA
  # ============================================================================
  - name: "inference-scheduling-wva"

    # =========================================================================
    # KUSTOMIZE DEPLOY METHOD   (scope: the ENTIRE stack)
    # -------------------------------------------------------------------------
    # When kustomize.enabled is true (or `-t kustomize` is passed) this
    # scenario is deployed by applying the UPSTREAM llm-d guide directly
    # (guides/<guideName> in the llm-d repo). In that mode the deployment is
    # defined ENTIRELY by the guide's own manifests:
    #
    #   * EVERYTHING ELSE in this scenario is IGNORED -- model, modelservice,
    #     standalone, decode/prefill, vllmCommon, storage, harness model, etc.
    #   * `-m/--models` and all other CLI/scenario tuning are ignored.
    #   * DoE `experiment` SETUP sweeps do NOT alter a kustomize deploy
    #     (only run/workload treatments still apply).
    #
    # The ONLY way to modify a kustomize deployment is the kustomize.* keys
    # below:
    #   patches / overlayPath           -> modelserver (the workload pods)
    #   extraHelmValues / extraHelmSets -> router / GAIE helm release
    #   guideVariableOverrides          -> override the guide README's ${VAR}
    # See docs/kustomize.md for the full reference and worked examples.
    #
    # NOT SUPPORTED with kustomize: multi-model / multi-stack scenarios
    # (the deploy is keyed on guideName with no per-stack uniquification --
    # stacks would collide). Use the modelservice method for multi-model.
    #
    # When kustomize.enabled is false (the DEFAULT) this whole block is
    # inert and the scenario deploys via modelservice/standalone as
    # configured further below.
    # =========================================================================
    kustomize:
      enabled: false

      guideName: "workload-autoscaling"
      repoPath: ""
      repoRef: "main"
      gaieVersion: ""
      acceleratorBackend: "gpu/vllm"
      monitoring: false
      overlayPath: ""
      extraHelmValues: []
      extraHelmSets: {}
      guideVariableOverrides: {}   # override/fill the guide README's ${VAR}

      # Inline kustomize strategic merge patches applied on top of the
      # guide's modelserver base.  For gated models, add an HF_TOKEN
      # env var patch (the secret is auto-created from HF_TOKEN env):
      # Default is empty -- upstream guide already injects HF_TOKEN from
      # the `llm-d-hf-token` Secret (auto-created by standup). Add entries
      # here only for non-token overrides (e.g. bump replicas, pin a
      # priorityClassName) -- see optimized-baseline.yaml for an example.
      patches: []

    # =========================================================================
    # MODEL CONFIGURATION
    # =========================================================================
    model:
      name: Qwen/Qwen3-32B
      shortName: qwen-qwen3-32b
      path: models/Qwen/Qwen3-32B
      huggingfaceId: Qwen/Qwen3-32B
      size: 1Ti
      maxModelLen: 16000
      blockSize: 64
      gpuMemoryUtilization: 0.95

    # =========================================================================
    # DEPLOYMENT METHOD
    # =========================================================================
    modelservice:
      enabled: true

    standalone:
      enabled: false

    gateway:
      className: epponly
    fma:
      enabled: true                    # launcher pods host vLLM and serve traffic;
                                       # WVA scales the requester Deployment
      iterations: 1                    # only matters for nop-harness actuation timing
                                       # runs; with inference-perf the requester pods
                                       # are created once at standup and WVA drives
                                       # scale during the run.

      requester:
        replicas: 1

      # Warmup: a deliberate wait inserted in the run phase before the
      # benchmark fires.
      warmupTimeout: 600
      warmupBufferSeconds: 240          # ~4 min; covers Qwen3-32B model load
                                        # on remaining launchers in the pool

    # =========================================================================
    # WVA CONFIGURATION
    #
    # Edit any field below to change WVA behavior for this scenario.
    # Remove a field to fall back to its default.
    # =========================================================================
    wva:
      enabled: true                  # master switch — same effect as `-u/--wva` on CLI

      # Upstream well-lit-path tag. Becomes the `llm-d.ai/guide` label on the
      # VariantAutoscaling so dashboards/queries can group by guide.
      wellLitPath: optimized-baseline

      # Where to install the WVA controller.
      # Empty = use the deploy namespace (the first slot of `-p`). Override by
      # passing `-p deploy,harness,wva` to put the controller elsewhere.
      # NOTE: With namespaceScoped=true (below), the controller ONLY watches
      # this namespace. Putting it in a different ns from your FMA requester
      # Deployment means it won't see your HPA.
      namespace: ""

      # Controller container image.
      # Pin `tag` to a release version for reproducibility, or set to "auto"
      # to let the version-resolver pick latest at plan time.
      # NOTE: image tags use a leading "v" (v0.6.0), distinct from the
      # helm chart version pinned in chartVersions.wva (which is bare 0.6.0).
      # Available version tags can be listed with:
      #   curl -sL "https://ghcr.io/token?scope=repository:llm-d/llm-d-workload-variant-autoscaler:pull" \
      #     | jq -r .token | xargs -I{} curl -sH "Authorization: Bearer {}" \
      #       https://ghcr.io/v2/llm-d/llm-d-workload-variant-autoscaler/tags/list
      image:
        repository: ghcr.io/llm-d/llm-d-workload-variant-autoscaler
        tag: v0.8.0-rc5

      replicaCount: 1                # WVA controller pod replicas (1 is the chart default)

      # Disable to skip installing the controller but still render the VA
      # + HPA (rare; useful when you reuse a cluster-wide controller
      # installed elsewhere).
      controller:
        enabled: true

      # Namespaced mode: controller only watches its own namespace. One WVA
      # controller per unique wva.namespace across all rendered stacks.
      # Set to false ONLY if you intend a single controller to manage
      # multiple namespaces (cluster-scoped mode — discouraged on shared
      # clusters because controllers from different tenants will race on
      # the same VAs).
      namespaceScoped: true

      # Controller-side metrics endpoint (scraped by user-workload-monitoring).
      # Don't change unless you have a port collision.
      metrics:
        enabled: true
        port: 8443                   # /metrics port on the controller
        secure: true                 # HTTPS + bearer-token auth

      # Where the controller queries to read vLLM metrics for its scaling
      # decisions. On OpenShift this is thanos-querier; on GKE point it at
      # your kube-prometheus-stack Service URL.
      prometheus:
        baseUrl: https://thanos-querier.openshift-monitoring.svc.cluster.local
        port: 9091

      # -----------------------------------------------------------------------
      # VariantAutoscaling — per-model scaling intent
      #
      # Should match the HPA min/max below; the VA caps what the controller
      # is willing to compute, the HPA caps what actually gets applied.
      # -----------------------------------------------------------------------
      variantAutoscaling:
        enabled: true                # required for the VA to render at all
        minReplicas: 1               # controller floor — never compute below this
        maxReplicas: 10              # controller ceiling — never compute above this
        # Relative GPU cost weight used by WVA's saturation solver to decide
        # WHICH model to scale when several share GPU capacity. Higher =
        # more expensive to scale up. Common tiering: H100=10, A100=8,
        # L40S=5, MI300X=10. Tweak per stack to express your business priority.
        variantCost: "10.0"
        # SLO targets the controller tries to keep the variant within when
        # computing desiredReplicas. Lower numbers = more aggressive scale-up
        # under load.
        slo:
          tpot: 10                   # Time-Per-Output-Token target (ms)
          ttft: 1000                 # Time-To-First-Token target (ms)

      # -----------------------------------------------------------------------
      # HorizontalPodAutoscaler — what actually changes the replica count
      #
      # The HPA reads `wva_desired_replicas` (emitted by the WVA controller
      # via prometheus-adapter) and scales the decode Deployment between
      # min/max.
      # -----------------------------------------------------------------------
      hpa:
        enabled: true                # set false to render the VA only, no HPA
        minReplicas: 1               # never scale below this — must be >= 1
                                     # (HPA refuses to manage targets at 0)
                                     # Keep aligned with variantAutoscaling.minReplicas above.
        maxReplicas: 10              # safety ceiling — scale-up cap regardless
                                     # of what the controller computes
                                     # Keep aligned with variantAutoscaling.maxReplicas above.
        targetAvgValue: 1            # target value the HPA tries to reach for
                                     # `wva_desired_replicas` per pod.
                                     # 1 = "match controller's desiredReplicas
                                     # exactly". Don't change unless you
                                     # understand HPA averaging math.

        # Scaling behavior — how aggressively the HPA reacts. See:
        #   https://kubernetes.io/docs/tasks/run-application/horizontal-pod-autoscale/#configurable-scaling-behavior
        behavior:
          scaleUp:
            # 30s (down from upstream's 120) so HPA reacts quickly when WVA
            # trips saturation — important for benchmark runs where the
            # configured load exceeds 1-replica capacity. Default 120s
            # leaves ~2 min of queue growth before relief, which pushes
            # requests past the harness's 300s per-request timeout. 30s
            # is still long enough to avoid flap.
            stabilizationWindowSeconds: 30
            policies:
              - type: Percent        # alternative: "Pods" (absolute pod count)
                value: 100           # 100% = double the current replica count per period
                periodSeconds: 15    # how often this policy is evaluated
          scaleDown:
            # Larger window for scale-down avoids thrashing when load
            # briefly dips. Bump to 300+ for batch workloads where transient
            # idle is normal.
            stabilizationWindowSeconds: 120
            policies:
              - type: Percent
                value: 100           # = halve the replica count per period
                periodSeconds: 15

      # vLLM *emulator* service — chart-internal feature for testing WVA
      # without real vLLM pods. We deploy real vLLM via the modelservice
      # chart, so we always disable this. Leave as-is.
      vllmService:
        enabled: false

    # =========================================================================
    # WVA-RELATED CHART VERSIONS
    #
    # Pins for the helm charts that step_03 installs as part of the WVA
    # pipeline. Bump these to track upstream releases; align with what the
    # upstream WVA guide currently calls for so the rule format and chart
    # values stay compatible.
    #   https://github.com/llm-d/llm-d/blob/main/guides/workload-autoscaling/README.wva.md
    # =========================================================================
    chartVersions:
      # WVA controller chart (oci://ghcr.io/llm-d/workload-variant-autoscaler)
      wva: 0.6.0
      # prometheus-adapter chart (prometheus-community/prometheus-adapter).
      # Pinned because newer releases have broken external-metric
      # compatibility with the rule format the WVA chart emits.
      # The upstream WVA README also pins this version.
      prometheusAdapter: 5.2.0

    # =========================================================================
    # ROUTING / GAIE CONFIGURATION
    # =========================================================================
    # WVA autoscaling is driven by EPP queue depth, so we must enable the
    # `flowControl` feature gate in the EPP's EndpointPickerConfig. That gate
    # is not on by default, and toggling it requires shipping a custom
    # EndpointPickerConfig (the default one the gaie chart ships has no
    # `featureGates` block). We inline it here and point `pluginsConfigFile`
    # at this filename so the chart mounts it as the active config.
    router:
      epp:
        pluginsConfigFile: "wva-plugins.yaml"
        pluginsCustomConfig:
          wva-plugins.yaml: |
            apiVersion: llm-d.ai/v1alpha1
            kind: EndpointPickerConfig
            featureGates:
              - flowControl
            plugins:
              - type: queue-scorer
              - type: kv-cache-utilization-scorer
              - type: prefix-cache-scorer
            schedulingProfiles:
              - name: default
                plugins:
                  - pluginRef: queue-scorer
                    weight: 2
                  - pluginRef: kv-cache-utilization-scorer
                    weight: 2
                  - pluginRef: prefix-cache-scorer
                    weight: 3

    # =========================================================================
    # PREFILL / DECODE CONFIGURATION
    #
    # decode.replicas is forced to 0 because FMA owns the elastic vLLM tier
    # under this topology — modelservice's decode Deployment isn't created
    # (`13_ms-values.yaml.j2:12` short-circuits to `decode.create: false`
    # when decode.replicas is 0). The router chart still renders gateway,
    # EPP, and InferencePool independently of decode_create.
    #
    # =========================================================================
    prefill:
      enabled: false
      replicas: 0

    decode:
      replicas: 0                      # FMA launcher pods serve traffic, not decode

    # =========================================================================
    # FMA LAUNCHER POD MONITORING (REQUIRED for WVA)
    #
    # WVA reads vLLM metrics via prometheus-adapter → user-workload-monitoring.
    # No PodMonitor → no metrics → HPA TARGETS stays `<unknown>` indefinitely
    # → autoscaling silently broken.
    #
    #
    # The PodMonitor template requires:
    #   - selector matchLabels: llm-d.ai/inferenceServing=true,
    #                           llm-d.ai/model=<model_id_label>
    #   - endpoints[].relabelings (NOT metricRelabelings — see WVA repo
    #     docs/design/controller-behavior.md):
    #         sourceLabels: [__meta_kubernetes_pod_label_llm_d_ai_variant]
    #         targetLabel: llm_d_ai_variant
    #         action: replace
    #   - chart label: release=llmd (so user-workload-monitoring discovers it)
    # =========================================================================

    # =========================================================================
    # VLLM COMMON CONFIGURATION
    # =========================================================================
    vllmCommon:
#      priorityClassName: nightly-gpu-critical
      kvTransfer:
        enabled: true
        connector: NixlConnector
        role: kv_both

      flags:
        # enforceEager: false (overrides the defaults.yaml default of true).
        # Cosmetic for the FMA path itself — FMA's launcher options are
        # hard-coded in 24_fma-deployment.yaml.j2 and don't read this flag —
        # but kept here to mirror the baseline scenario and to document intent
        # if FMA's template ever starts honoring vllmCommon.flags.
        enforceEager: false
        disableLogRequests: true
        disableUvicornAccessLog: true
        allowLongMaxModelLen: "1"
        serverDevMode: "1"

      volumes:
        - name: shared-config
          type: emptyDir
          emptyDir: {}
        - name: dshm
          type: emptyDir
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi

      volumeMounts:
        - name: dshm
          mountPath: /dev/shm
        - name: shared-config
          mountPath: /shared-config

    # =========================================================================
    # STORAGE
    # =========================================================================
    storage:
      modelPvc:
        size: 1Ti

    # =========================================================================
    # WORKLOAD / HARNESS
    # =========================================================================
    workDir: "~/data/workload-autoscaling"

    harness:
      name: inference-perf
      # Use the heavy variant of shared_prefix_synthetic (8 parallel workers,
      # ~200 RPS aggregate, larger prompts) calibrated to drive WVA's
      # saturation gauges past the optimizer's threshold so OPTIMIZED
      # actually climbs above 1 on this small model.
      experimentProfile: shared_prefix_synthetic_heavy.yaml

    images:
      benchmark:
        tag: nightly
