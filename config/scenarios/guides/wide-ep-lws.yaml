# WIDE EP/DP WITH LWS WELL LIT PATH
# Based on https://github.com/llm-d/llm-d/tree/main/guides/wide-ep-lws/README.md
# Migrated from bash environment variables to YAML format
#
# Notes:
# - Removed pod monitoring; can be added using decode.extraContainerConfig / prefill.extraContainerConfig
# - Removed extra volumes metrics-volume and torch-compile-volume (not needed for this model/hardware)
# - Use decode.additionalVolumeMounts and decode.additionalVolumes to add them if needed
# - Use prefill.additionalVolumeMounts and prefill.additionalVolumes to add them if needed

scenario:
  # ============================================================================
  # Wide EP/DP with LWS - Qwen3-30B-A3B with multinode support
  # ============================================================================
  - name: "wide-ep-lws"

    # =========================================================================
    # KUSTOMIZE DEPLOY METHOD   (scope: the ENTIRE stack)
    # -------------------------------------------------------------------------
    # When kustomize.enabled is true (or `-t kustomize` is passed) this
    # scenario is deployed by applying the UPSTREAM llm-d guide directly
    # (guides/<guideName> in the llm-d repo). In that mode the deployment is
    # defined ENTIRELY by the guide's own manifests:
    #
    #   * EVERYTHING ELSE in this scenario is IGNORED -- model, modelservice,
    #     standalone, decode/prefill, vllmCommon, storage, harness model, etc.
    #   * `-m/--models` and all other CLI/scenario tuning are ignored.
    #   * DoE `experiment` SETUP sweeps do NOT alter a kustomize deploy
    #     (only run/workload treatments still apply).
    #
    # The ONLY way to modify a kustomize deployment is the kustomize.* keys
    # below:
    #   patches / overlayPath           -> modelserver (the workload pods)
    #   extraHelmValues / extraHelmSets -> router / GAIE helm release
    #   guideVariableOverrides          -> override the guide README's ${VAR}
    # See docs/kustomize.md for the full reference and worked examples.
    #
    # NOT SUPPORTED with kustomize: multi-model / multi-stack scenarios
    # (the deploy is keyed on guideName with no per-stack uniquification --
    # stacks would collide). Use the modelservice method for multi-model.
    #
    # When kustomize.enabled is false (the DEFAULT) this whole block is
    # inert and the scenario deploys via modelservice/standalone as
    # configured further below.
    # =========================================================================
    kustomize:
      enabled: false

      guideName: "wide-ep-lws"
      repoPath: ""
      repoRef: "main"
      gaieVersion: ""
      acceleratorBackend: "gpu/vllm"
      monitoring: false
      overlayPath: ""
      extraHelmValues: []
      extraHelmSets: {}
      guideVariableOverrides: {}   # override/fill the guide README's ${VAR}

      # Inline kustomize strategic merge patches applied on top of the
      # guide's modelserver base.  For gated models, add an HF_TOKEN
      # env var patch (the secret is auto-created from HF_TOKEN env):
      patches:
         - patch: |
             apiVersion: apps/v1
             kind: Deployment
             metadata:
               name: decode
             spec:
               template:
                 spec:
                   containers:
                     - name: modelserver
                       env:
                         - name: HF_TOKEN
                           valueFrom:
                             secretKeyRef:
                               name: llm-d-hf-token
                               key: HF_TOKEN
         - patch: |
             apiVersion: apps/v1
             kind: Deployment
             metadata:
               name: prefill
             spec:
               template:
                 spec:
                   containers:
                     - name: modelserver
                       env:
                         - name: HF_TOKEN
                           valueFrom:
                             secretKeyRef:
                               name: llm-d-hf-token
                               key: HF_TOKEN

    # =========================================================================
    # COMMON -- Applies to all deployment methods
    # =========================================================================

    # -------------------------------------------------------------------------
    # Model Configuration
    #
    #
    #
    #
    #
    #
    # -------------------------------------------------------------------------
    model:
      name: Qwen/Qwen3-30B-A3B
      shortName: qwen-qwen3-30b-a3b
      path: models/Qwen/Qwen3-30B-A3B
      huggingfaceId: Qwen/Qwen3-30B-A3B
#      name: deepseek-ai/DeepSeek-R1-0528
#      shortName: DeepSeek-R1-0528
#      path: models/deepseek-ai/DeepSeek-R1-0528
#      huggingfaceId: deepseek-ai/DeepSeek-R1-0528
      size: 1Ti
      maxModelLen: 4000
      blockSize: 64
      gpuMemoryUtilization: 0.75
      cacheBase: /model-cache

    # =========================================================================
    # MODELSERVICE -- Only applies when modelservice.enabled: true
    # The following sections configure the llm-d modelservice Helm chart
    # deployment including decode pods, prefill pods, routing, and GAIE.
    # =========================================================================

    # -------------------------------------------------------------------------
    # Multinode Configuration (LeaderWorkerSet)
    # -------------------------------------------------------------------------
    multinode:
      enabled: true

    # -------------------------------------------------------------------------
    # Scheduler Configuration
    # (commented out in original -- uncomment to enable)
    # -------------------------------------------------------------------------
    # schedulerName: custom-binpack-scheduler

    # =========================================================================
    # DEPLOYMENT METHOD -- Choose standalone or modelservice
    # =========================================================================
    modelservice:
      enabled: true

    standalone:
      enabled: false

    gateway:
      className: epponly

    # -------------------------------------------------------------------------
    # Routing Configuration
    # -------------------------------------------------------------------------
    routing:
      connector: nixlv2

    # -------------------------------------------------------------------------
    # Affinity / Node Selection
    # By default, affinity is disabled and pods schedule on any available node.
    # Options:
    #   1. Leave commented out -- no node selection constraint
    #   2. Set nodeSelector to "auto" -- auto-detects GPU labels from the cluster
    #   3. Set explicit labels -- pods only schedule on matching nodes
    # -------------------------------------------------------------------------
    # affinity:
    #   enabled: true
    #   nodeSelector:
    #     nvidia.com/gpu.product: NVIDIA-H100-80GB-HBM3      # OpenShift
    #     # gpu.nvidia.com/model: H200                        # Kubernetes
    #     # cloud.google.com/gke-accelerator: nvidia-h100-80gb  # GKE

    # -------------------------------------------------------------------------
    # Routing / GAIE Configuration
    # Reference: https://github.com/llm-d/llm-d/blob/main/guides/wide-ep-lws/router/wide-ep-lws.values.yaml
    # The plugins block uses the `llm-d.ai/v1alpha1` apiVersion shipped
    # by the llm-d-router-{standalone,gateway}-dev charts.
    # -------------------------------------------------------------------------
    router:
      inferencePool:
        failureMode: "FailOpen"
        # Inference Pool Provider Configuration -- rendered to root-level
        # provider.{gatewayClassName}.{...} for gke/istio. Host is
        # auto-resolved from model_id_label by render_plans.
        providerConfig:
          destinationRule:
            trafficPolicy:
              connectionPool:
                http:
                  http1MaxPendingRequests: 256000
                  maxRequestsPerConnection: 256000
                  http2MaxRequests: 256000
                  idleTimeout: "900s"
                tcp:
                  maxConnections: 256000
                  maxConnectionDuration: "1800s"
                  connectTimeout: "900s"
      epp:
        replicas: 1
        flags:
          v: 2
        pluginsConfigFile: "default-plugins.yaml"
        resources:
          requests:
            cpu: "4"
            memory: 8Gi
          limits:
            memory: 16Gi

      # Envoy sidecar tunables for the standalone chart (epponly only).
      proxy:
        args:
          - "--service-node"
          - "envoy-sidecar"
          - "--log-level"
          - "warn"
          - "--concurrency"
          - "8"
          - "--drain-strategy"
          - "immediate"
          - "--drain-time-s"
          - "60"
          - "-c"
          - "/etc/envoy/envoy.yaml"
        resources:
          requests:
            cpu: "4"
            memory: 8Gi
          limits:
            memory: 16Gi

    # =========================================================================
    # COMMON -- Applies to all deployment methods (continued)
    # =========================================================================

    # -------------------------------------------------------------------------
    # Storage Configuration
    # -------------------------------------------------------------------------
    storage:
      modelPvc:
        size: 1Ti
        # Uncomment to specify storage class:
        # storageClassName: standard-rwx
        # storageClassName: shared-vast
        # storageClassName: ocs-storagecluster-cephfs

    # =========================================================================
    # MODELSERVICE -- Only applies when modelservice.enabled: true
    # The following sections configure the llm-d modelservice Helm chart
    # deployment including decode pods, prefill pods, routing, and GAIE.
    # =========================================================================

    # -------------------------------------------------------------------------
    # Prefill Configuration
    # -------------------------------------------------------------------------
    prefill:
      enabled: true
      replicas: 1
#      replicas: 8
      vllm:
        customCommand: |
          export LD_LIBRARY_PATH=$(find / -name libcuda.so.1 -printf '%h\n' 2>/dev/null | sed ':a; N; $!ba; s/\n/:/g'):${LD_LIBRARY_PATH}
          export LIBRARY_PATH=$(find / -name libcuda.so.1 -printf '%h\n' 2>/dev/null | head -1):${LIBRARY_PATH}
          . /shared-config/llmdbench_env.sh
          vllm serve /model-cache/$MODEL_PATH \
          --host 0.0.0.0 \
          --served-model-name $MODEL_NAME \
          --port $VLLM_INFERENCE_PORT \
          --trust-remote-code \
          --gpu-memory-utilization $VLLM_ACCELERATOR_MEM_UTIL \
          --disable-access-log-for-endpoints=/health,/metrics \
          --data-parallel-hybrid-lb \
          --enable-expert-parallel \
          --tensor-parallel-size $TP_SIZE \
          --max-num-seq $VLLM_MAX_NUM_SEQ \
          --max-num-batched-tokens $VLLM_MAX_NUM_BATCHED_TOKENS \
          --data-parallel-size $((LWS_GROUP_SIZE * DP_SIZE_LOCAL)) \
          --data-parallel-size-local $DP_SIZE_LOCAL \
          --data-parallel-address ${LWS_LEADER_ADDRESS} \
          --data-parallel-rpc-port 5555 \
          --data-parallel-start-rank $START_RANK \
          --kv-transfer-config '{"kv_connector":"NixlConnector","kv_role":"kv_both","kv_load_failure_policy":"fail"}' \
          --enable-dbo \
          --dbo-prefill-token-threshold 32 \
          --enable-eplb \
          --eplb-config '{"window_size":"1000","step_interval":"3000","num_redundant_experts":"32","log_balancedness":"False"}' \
          --moe-backend deep_gemm \
          --all2all-backend deepep_high_throughput \
          --disable-uvicorn-access-log

      initContainers:
        - name: preprocess
          imageKey: benchmark
          imagePullPolicy: Always
          command: ["set_llmdbench_environment.py", "-e", "/shared-config/llmdbench_env.sh", "-i"]
          volumeMounts:
            - name: shared-config
              mountPath: /shared-config

      parallelism:
        tensor: 1
        data: 1
        dataLocal: 8
        workers: 2

      # Resource configuration
      resources:
        limits:
          ephemeral-storage: 1Ti
          memory: 512Gi
          cpu: "32"
        requests:
          ephemeral-storage: 1Ti
          memory: 512Gi
          cpu: "32"

      # Startup probe overrides
      probes:
        startup:
          failureThreshold: 2700
          initialDelaySeconds: 240
          periodSeconds: 30
          timeoutSeconds: 5
          path: /v1/models
        liveness:
          failureThreshold: 3
          periodSeconds: 5
        readiness:
          failureThreshold: 3
          periodSeconds: 5
          path: /v1/models

      # -----------------------------------------------------------------------
      # Extra Environment Variables
      # -----------------------------------------------------------------------
      extraEnvVars:
        - name: VLLM_SKIP_P2P_CHECK
          value: "1"
        - name: VLLM_RANDOMIZE_DP_DUMMY_INPUTS
          value: "1"
        - name: VLLM_USE_DEEP_GEMM
          value: "1"
        - name: NVIDIA_GDRCOPY
          value: "enabled"
        - name: NCCL_EXCLUDE_IB_HCA
          value: "mlx5_0,mlx5_2,mlx5_4,mlx5_8,mlxl5_7,mlx5_10,mlx5_12,mlx5_14,mlx5_16"
        - name: NVSHMEM_DEBUG
          value: "INFO"
        - name: HF_HUB_DISABLE_XET
          value: "1"
        - name: NCCL_DEBUG
          value: "INFO"
        - name: NCCL_DEBUG_SUBSYS
          value: "INIT,NET"
        - name: NCCL_DEBUG_FILE
          value: "/tmp/nccl.%h.%p.log"

      # -----------------------------------------------------------------------
      # Extra Container Configuration
      # -----------------------------------------------------------------------
      extraContainerConfig:
        securityContext:
          capabilities:
            add:
              - "IPC_LOCK"
              - "SYS_RAWIO"
              - "NET_ADMIN"
              - "NET_RAW"
          runAsGroup: 0
          runAsUser: 0
        imagePullPolicy: Always

      # -----------------------------------------------------------------------
      # Additional Volume Mounts
      # -----------------------------------------------------------------------
      additionalVolumeMounts: []

      # -----------------------------------------------------------------------
      # Additional Volumes
      # -----------------------------------------------------------------------
      additionalVolumes: []

    # -------------------------------------------------------------------------
    # Decode Configuration
    # -------------------------------------------------------------------------
    decode:
      replicas: 1
      vllm:
        customCommand: |
          export LD_LIBRARY_PATH=$(find / -name libcuda.so.1 -printf '%h\n' 2>/dev/null | sed ':a; N; $!ba; s/\n/:/g'):${LD_LIBRARY_PATH}
          export LIBRARY_PATH=$(find / -name libcuda.so.1 -printf '%h\n' 2>/dev/null | head -1):${LIBRARY_PATH}
          . /shared-config/llmdbench_env.sh
          vllm serve /model-cache/$MODEL_PATH \
          -host 0.0.0.0 \
          --served-model-name $MODEL_NAME \
          --port $VLLM_METRICS_PORT \
          --gpu-memory-utilization $VLLM_ACCELERATOR_MEM_UTIL \
          --trust-remote-code \
          --api-server-count 1 \
          --disable-access-log-for-endpoints=/health,/metrics \
          --data-parallel-hybrid-lb \
          --enable-expert-parallel \
          --tensor-parallel-size $TP_SIZE \
          --max-num-seq $VLLM_MAX_NUM_SEQ \
          --max-num-batched-tokens $VLLM_MAX_NUM_BATCHED_TOKENS \
          --data-parallel-size $((LWS_GROUP_SIZE * DP_SIZE_LOCAL)) \
          --data-parallel-size-local $DP_SIZE_LOCAL \
          --data-parallel-address ${LWS_LEADER_ADDRESS} \
          --data-parallel-rpc-port 5555 \
          --data-parallel-start-rank $START_RANK \
          --kv-transfer-config '{"kv_connector":"NixlConnector","kv_role":"kv_both","kv_load_failure_policy":"fail"}' \
          --enable-dbo \
          --dbo-decode-token-threshold 32 \
          --enable-eplb \
          --eplb-config '{"window_size":"1000","step_interval":"3000","num_redundant_experts":"32","log_balancedness":"False"}' \
          --all2all-backend deepep_low_latency \
          --moe-backend deep_gemm \
          --kv-cache-memory-bytes=${KV_CACHE_MEMORY_BYTES:-} \
          --disable-uvicorn-access-log \

      initContainers:
        - name: preprocess
          imageKey: benchmark
          imagePullPolicy: Always
          command: ["set_llmdbench_environment.py", "-e", "/shared-config/llmdbench_env.sh", "-i"]
          volumeMounts:
            - name: shared-config
              mountPath: /shared-config

      parallelism:
        tensor: 1
        data: 1
        dataLocal: 8
        workers: 2

      # Resource configuration
      resources:
        limits:
          ephemeral-storage: 1Ti
          memory: 512Gi
          cpu: "32"
        requests:
          ephemeral-storage: 1Ti
          memory: 512Gi
          cpu: "32"

      # -----------------------------------------------------------------------
      # ROCE/GDR Configuration (uncomment to enable)
      # To enable roce/gdr for prefill pods, add networkResource and networkNr below.
      # -----------------------------------------------------------------------
      networkResource: "rdma/roce_gdr"
      networkNr: 1

      # Startup probe overrides
      probes:
        startup:
          failureThreshold: 2700
          initialDelaySeconds: 240
          periodSeconds: 30
          timeoutSeconds: 5
          path: /v1/models
        liveness:
          failureThreshold: 3
          periodSeconds: 5
        readiness:
          failureThreshold: 3
          periodSeconds: 5
          path: /v1/models

      # -----------------------------------------------------------------------
      # Extra Environment Variables
      # Same as prefill (both use LLMDBENCH_VLLM_COMMON_ENVVARS_TO_YAML)
      # -----------------------------------------------------------------------
      extraEnvVars:
        - name: VLLM_SKIP_P2P_CHECK
          value: "1"
        - name: VLLM_RANDOMIZE_DP_DUMMY_INPUTS
          value: "1"
        - name: VLLM_USE_DEEP_GEMM
          value: "1"
        - name: NVIDIA_GDRCOPY
          value: "enabled"
        - name: NCCL_EXCLUDE_IB_HCA
          value: "mlx5_0,mlx5_2,mlx5_4,mlx5_8,mlxl5_7,mlx5_10,mlx5_12,mlx5_14,mlx5_16"
        - name: NVSHMEM_DEBUG
          value: "INFO"
        - name: HF_HUB_DISABLE_XET
          value: "1"
        - name: NCCL_DEBUG
          value: "INFO"
        - name: NCCL_DEBUG_SUBSYS
          value: "INIT,NET"
        - name: NCCL_DEBUG_FILE
          value: "/tmp/nccl.%h.%p.log"

      # -----------------------------------------------------------------------
      # Extra Container Configuration
      # -----------------------------------------------------------------------
      extraContainerConfig:
        securityContext:
          capabilities:
            add:
              - "IPC_LOCK"
              - "SYS_RAWIO"
              - "NET_ADMIN"
              - "NET_RAW"
          runAsGroup: 0
          runAsUser: 0
        imagePullPolicy: Always

      # -----------------------------------------------------------------------
      # Additional Volume Mounts
      # -----------------------------------------------------------------------
      additionalVolumeMounts: []

      # -----------------------------------------------------------------------
      # Additional Volumes
      # -----------------------------------------------------------------------
      additionalVolumes: []

    # =========================================================================
    # COMMON -- Applies to all deployment methods (continued)
    # =========================================================================

#####    annotations:
#####      prefill:
#####        pod:
#####          k8s.v1.cni.cncf.io/networks: multi-nic-inference
#####      decode:
#####        pod:
#####          k8s.v1.cni.cncf.io/networks: multi-nic-inference

    vllmCommon:
#      priorityClassName: nightly-gpu-critical
#####      ucxTls: "rc,sm,cuda_ipc,cuda_copy,tcp"
      networkResource: "auto"   # auto-detect from cluster nodes
      networkNr: "1"            # number of network devices

      volumes:
        - name: shared-config
          type: emptyDir
          emptyDir: {}
        - name: dshm
          type: emptyDir
          emptyDir:
            medium: Memory
            sizeLimit: 32Gi

      volumeMounts:
        - name: shared-config
          mountPath: /shared-config
        - name: dshm
          mountPath: /dev/shm

    # -------------------------------------------------------------------------
    # Timeout Configuration
    # -------------------------------------------------------------------------
    timeouts:
      controlWait: 900000
      harnessWait: 900000

    # =========================================================================
    # WORKLOAD / HARNESS -- Benchmark execution configuration
    # =========================================================================

    # -------------------------------------------------------------------------
    # Workload/Harness Configuration
    # -------------------------------------------------------------------------
    workDir: "~/data/wide-ep-lws"

    harness:
      name: vllm-benchmark
      experimentProfile: random_concurrent.yaml
