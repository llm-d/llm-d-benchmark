# P/D DISAGGREGATION WELL LIT PATH
# Based on https://github.com/llm-d/llm-d/tree/main/guides/pd-disaggregation/README.md
# Migrated from bash environment variables to YAML format
#
# Notes:
# - Removed pod monitoring; can be added using decode.extraContainerConfig / prefill.extraContainerConfig
# - Removed extra volumes metrics-volume and torch-compile-volume (not needed for this model/hardware)
# - Use decode.additionalVolumeMounts and decode.additionalVolumes to add them if needed
# - Use prefill.additionalVolumeMounts and prefill.additionalVolumes to add them if needed

scenario:
  # ============================================================================
  # P/D Disaggregation - Qwen3-32B with 2 prefill and 2 decode pods
  # ============================================================================
  - name: "pd-disaggregation"

    # =========================================================================
    # KUSTOMIZE DEPLOY METHOD   (scope: the ENTIRE stack)
    # -------------------------------------------------------------------------
    # When kustomize.enabled is true (or `-t kustomize` is passed) this
    # scenario is deployed by applying the UPSTREAM llm-d guide directly
    # (guides/<guideName> in the llm-d repo). In that mode the deployment is
    # defined ENTIRELY by the guide's own manifests:
    #
    #   * EVERYTHING ELSE in this scenario is IGNORED -- model, modelservice,
    #     standalone, decode/prefill, vllmCommon, storage, harness model, etc.
    #   * `-m/--models` and all other CLI/scenario tuning are ignored.
    #   * DoE `experiment` SETUP sweeps do NOT alter a kustomize deploy
    #     (only run/workload treatments still apply).
    #
    # The ONLY way to modify a kustomize deployment is the kustomize.* keys
    # below:
    #   patches / overlayPath           -> modelserver (the workload pods)
    #   extraHelmValues / extraHelmSets -> router / GAIE helm release
    #   guideVariableOverrides          -> override the guide README's ${VAR}
    # See docs/kustomize.md for the full reference and worked examples.
    #
    # NOT SUPPORTED with kustomize: multi-model / multi-stack scenarios
    # (the deploy is keyed on guideName with no per-stack uniquification --
    # stacks would collide). Use the modelservice method for multi-model.
    #
    # When kustomize.enabled is false (the DEFAULT) this whole block is
    # inert and the scenario deploys via modelservice/standalone as
    # configured further below.
    # =========================================================================
    kustomize:
      enabled: false

      guideName: "pd-disaggregation"
      repoPath: ""
      repoRef: "main"
      gaieVersion: ""
      acceleratorBackend: "gpu/vllm"
      monitoring: false
      overlayPath: ""
      extraHelmValues: []
      extraHelmSets: {}
      guideVariableOverrides: {}   # override/fill the guide README's ${VAR}

      # Inline kustomize strategic merge patches applied on top of the
      # guide's modelserver base.  For gated models, add an HF_TOKEN
      # env var patch (the secret is auto-created from HF_TOKEN env):
      patches:
         - patch: |
             apiVersion: apps/v1
             kind: Deployment
             metadata:
               name: decode
             spec:
               template:
                 spec:
                   containers:
                     - name: modelserver
                       env:
                         - name: HF_TOKEN
                           valueFrom:
                             secretKeyRef:
                               name: llm-d-hf-token
                               key: HF_TOKEN
         - patch: |
             apiVersion: apps/v1
             kind: Deployment
             metadata:
               name: prefill
             spec:
               template:
                 spec:
                   containers:
                     - name: modelserver
                       env:
                         - name: HF_TOKEN
                           valueFrom:
                             secretKeyRef:
                               name: llm-d-hf-token
                               key: HF_TOKEN

    # =========================================================================
    # COMMON -- Applies to all deployment methods
    # =========================================================================

    # -------------------------------------------------------------------------
    # Model Configuration
    # Alternative models (commented out in original):
    #   - Qwen/Qwen3-0.6B
    #   - facebook/opt-125m
    #   - meta-llama/Llama-3.1-8B-Instruct
    #   - meta-llama/Llama-3.1-70B-Instruct
    #   - deepseek-ai/DeepSeek-R1-0528
    # -------------------------------------------------------------------------
    model:
      name: Qwen/Qwen3-32B
      shortName: qwen-qwen3-32b
      path: models/Qwen/Qwen3-32B
      huggingfaceId: Qwen/Qwen3-32B
#      name: openai/gpt-oss-120b
#      shortName: openai-gpt-oss-120b
#      path: models/openai/gpt-oss-120b
#      huggingfaceId: openai/gpt-oss-120b
      size: 1Ti
      maxModelLen: 16384
      blockSize: 128
      gpuMemoryUtilization: 0.90
      cacheBase: /model-cache

    # =========================================================================
    # MODELSERVICE -- Only applies when modelservice.enabled: true
    # The following sections configure the llm-d modelservice Helm chart
    # deployment including decode pods, prefill pods, routing, and GAIE.
    # =========================================================================

    # -------------------------------------------------------------------------
    # Multinode Configuration (LeaderWorkerSet)
    # -------------------------------------------------------------------------
    #multinode:
    #  enabled: true

    # -------------------------------------------------------------------------
    # Scheduler Configuration
    # (commented out in original -- uncomment to enable)
    # -------------------------------------------------------------------------
    # schedulerName: custom-binpack-scheduler

    # =========================================================================
    # DEPLOYMENT METHOD -- Choose standalone or modelservice
    # =========================================================================
    modelservice:
      enabled: true

    standalone:
      enabled: false

    gateway:
      className: epponly

    # -------------------------------------------------------------------------
    # Routing Configuration
    # -------------------------------------------------------------------------
    routing:
      connector: nixlv2

    # -------------------------------------------------------------------------
    # Affinity / Node Selection
    # By default, affinity is disabled and pods schedule on any available node.
    # Options:
    #   1. Leave commented out -- no node selection constraint
    #   2. Set nodeSelector to "auto" -- auto-detects GPU labels from the cluster
    #   3. Set explicit labels -- pods only schedule on matching nodes
    # -------------------------------------------------------------------------
    # affinity:
    #   enabled: true
    #   nodeSelector:
    #     nvidia.com/gpu.product: NVIDIA-H100-80GB-HBM3      # OpenShift
    #     # gpu.nvidia.com/model: H200                        # Kubernetes
    #     # cloud.google.com/gke-accelerator: nvidia-h100-80gb  # GKE

    # -------------------------------------------------------------------------
    # Routing / GAIE Configuration
    # Reference: https://github.com/llm-d/llm-d/blob/main/guides/pd-disaggregation/router/pd-disaggregation.values.yaml
    # The plugins block uses the `llm-d.ai/v1alpha1` apiVersion shipped
    # by the llm-d-router-{standalone,gateway}-dev charts.
    # -------------------------------------------------------------------------
    inferenceExtension:
      pluginsConfigFile: "pd-config.yaml"
      pluginsCustomConfig:
        pd-config.yaml: |
          apiVersion: llm-d.ai/v1alpha1
          kind: EndpointPickerConfig
          plugins:
          - type: disagg-headers-handler
          - type: always-disagg-pd-decider
          - type: disagg-profile-handler
            parameters:
              deciderPluginName: always-disagg-pd-decider
          - type: prefill-filter
          - type: decode-filter
          - type: prefix-cache-scorer
          - type: queue-scorer
          - type: kv-cache-utilization-scorer
          - type: active-request-scorer
          - type: max-score-picker
          schedulingProfiles:
          - name: prefill
            plugins:
            - pluginRef: prefill-filter
            - pluginRef: prefix-cache-scorer
              weight: 3
            - pluginRef: queue-scorer
              weight: 2
            - pluginRef: kv-cache-utilization-scorer
              weight: 2
            - pluginRef: max-score-picker
          - name: decode
            plugins:
            - pluginRef: decode-filter
            - pluginRef: active-request-scorer
              weight: 2
            - pluginRef: prefix-cache-scorer
              weight: 3
            - pluginRef: max-score-picker

    # =========================================================================
    # COMMON -- Applies to all deployment methods (continued)
    # =========================================================================

    # -------------------------------------------------------------------------
    # Storage Configuration
    # -------------------------------------------------------------------------
    storage:
      modelPvc:
        size: 1Ti
        # Uncomment to specify storage class:
        # storageClassName: standard-rwx
        # storageClassName: shared-vast
        # storageClassName: ocs-storagecluster-cephfs

    # =========================================================================
    # MODELSERVICE -- Only applies when modelservice.enabled: true (continued)
    # The following sections configure prefill and decode pods.
    # =========================================================================

    # -------------------------------------------------------------------------
    # Prefill Configuration
    # -------------------------------------------------------------------------
    prefill:
      enabled: true
      replicas: 1
#      replicas: 8
      vllm:
        customCommand: |
          export LD_LIBRARY_PATH=$(find / -name libcuda.so.1 -printf '%h\n' 2>/dev/null | sed ':a; N; $!ba; s/\n/:/g'):${LD_LIBRARY_PATH}
          export LIBRARY_PATH=$(find / -name libcuda.so.1 -printf '%h\n' 2>/dev/null | head -1):${LIBRARY_PATH}
          . /shared-config/llmdbench_env.sh
          vllm serve /model-cache/$MODEL_PATH \
          --host 0.0.0.0 \
          --served-model-name $MODEL_NAME \
          --port $VLLM_INFERENCE_PORT \
          --block-size $VLLM_BLOCK_SIZE \
          --max-model-len $VLLM_MAX_MODEL_LEN \
          --max-num-seq $VLLM_MAX_NUM_SEQ \
          --max-num-batched-tokens $VLLM_MAX_NUM_BATCHED_TOKENS \
          --tensor-parallel-size $TP_SIZE \
          --gpu-memory-utilization $VLLM_ACCELERATOR_MEM_UTIL \
          --kv-transfer-config '{"kv_connector":"NixlConnector", "kv_role":"kv_both"}' \
          --disable-uvicorn-access-log \
          --disable-access-log-for-endpoints=/health,/metrics,/v1/models \
          --no-enable-prefix-caching \
          --dtype bfloat16 \
          --no-disable-hybrid-kv-cache-manager

      initContainers:
        - name: preprocess
          imageKey: benchmark
          imagePullPolicy: Always
          command: ["set_llmdbench_environment.py", "-e", "/shared-config/llmdbench_env.sh", "-i"]
          volumeMounts:
            - name: shared-config
              mountPath: /shared-config

      parallelism:
        tensor: 1
        data: 1
        dataLocal: 1
        workers: 1

      # Resource configuration
      resources:
        limits:
          memory: 16Gi
          cpu: "8"
        requests:
          memory: 16Gi
          cpu: "8"

      # -----------------------------------------------------------------------
      # Extra Environment Variables
      # -----------------------------------------------------------------------
      extraEnvVars:
        - name: NCCL_EXCLUDE_IB_HCA
          value: "mlx5_0,mlx5_2,mlx5_4,mlx5_8,mlxl5_7,mlx5_10,mlx5_12,mlx5_14,mlx5_16"
        - name: NVSHMEM_DEBUG
          value: "INFO"
        - name: NIXL_LOG_LEVEL
          value: debug
        - name: UCX_MAX_RMA_RAILS
          value: "1"

      # -----------------------------------------------------------------------
      # Extra Container Configuration
      # -----------------------------------------------------------------------
      extraContainerConfig:
        securityContext:
          capabilities:
            add:
              - "IPC_LOCK"
              - "SYS_RAWIO"
              - "NET_ADMIN"
              - "NET_RAW"
          runAsGroup: 0
          runAsUser: 0
        imagePullPolicy: Always

      # -----------------------------------------------------------------------
      # Additional Volume Mounts
      # -----------------------------------------------------------------------
      additionalVolumeMounts: []

      # -----------------------------------------------------------------------
      # Additional Volumes
      # -----------------------------------------------------------------------
      additionalVolumes: []

    # -------------------------------------------------------------------------
    # Decode Configuration
    # -------------------------------------------------------------------------
    decode:
      replicas: 2
      vllm:
        customCommand: |
          export LD_LIBRARY_PATH=$(find / -name libcuda.so.1 -printf '%h\n' 2>/dev/null | sed ':a; N; $!ba; s/\n/:/g'):${LD_LIBRARY_PATH}
          export LIBRARY_PATH=$(find / -name libcuda.so.1 -printf '%h\n' 2>/dev/null | head -1):${LIBRARY_PATH}
          . /shared-config/llmdbench_env.sh
          vllm serve /model-cache/$MODEL_PATH \
          --host 0.0.0.0 \
          --served-model-name $MODEL_NAME \
          --port $VLLM_METRICS_PORT \
          --block-size $VLLM_BLOCK_SIZE \
          --max-model-len $VLLM_MAX_MODEL_LEN \
          --max-num-seq $VLLM_MAX_NUM_SEQ \
          --max-num-batched-tokens $VLLM_MAX_NUM_BATCHED_TOKENS \
          --tensor-parallel-size $TP_SIZE \
          --gpu-memory-utilization $VLLM_ACCELERATOR_MEM_UTIL \
          --kv-transfer-config '{"kv_connector":"NixlConnector", "kv_role":"kv_both"}' \
          --disable-uvicorn-access-log \
          --disable-access-log-for-endpoints=/health,/metrics,/v1/models \
          --no-enable-prefix-caching \
          --dtype bfloat16 \
          --no-disable-hybrid-kv-cache-manager

      initContainers:
        - name: preprocess
          imageKey: benchmark
          imagePullPolicy: Always
          command: ["set_llmdbench_environment.py", "-e", "/shared-config/llmdbench_env.sh", "-i"]
          volumeMounts:
            - name: shared-config
              mountPath: /shared-config

      parallelism:
        tensor: 2
        data: 1
        dataLocal: 1
        workers: 1

      # Resource configuration
      resources:
        limits:
          memory: 128Gi
          cpu: "32"
        requests:
          memory: 128Gi
          cpu: "32"

      # -----------------------------------------------------------------------
      # Extra Environment Variables
      # -----------------------------------------------------------------------
      extraEnvVars:
        - name: NCCL_EXCLUDE_IB_HCA
          value: "mlx5_0,mlx5_2,mlx5_4,mlx5_8,mlxl5_7,mlx5_10,mlx5_12,mlx5_14,mlx5_16"
        - name: NVSHMEM_DEBUG
          value: "INFO"
        - name: NIXL_LOG_LEVEL
          value: debug
        - name: UCX_MAX_RMA_RAILS
          value: "1"

      # -----------------------------------------------------------------------
      # Extra Container Configuration
      # -----------------------------------------------------------------------
      extraContainerConfig:
        securityContext:
          capabilities:
            add:
              - "IPC_LOCK"
              - "SYS_RAWIO"
              - "NET_ADMIN"
              - "NET_RAW"
          runAsGroup: 0
          runAsUser: 0
        imagePullPolicy: Always

      # -----------------------------------------------------------------------
      # Additional Volume Mounts
      # -----------------------------------------------------------------------
      additionalVolumeMounts: []

      # -----------------------------------------------------------------------
      # Additional Volumes
      # -----------------------------------------------------------------------
      additionalVolumes: []

    # =========================================================================
    # COMMON -- Applies to all deployment methods (continued)
    # =========================================================================

#####    annotations:
#####      prefill:
#####        pod:
#####          k8s.v1.cni.cncf.io/networks: multi-nic-compute
#####      decode:
#####        pod:
#####          k8s.v1.cni.cncf.io/networks: multi-nic-compute

    vllmCommon:
#####      priorityClassName: nightly-gpu-critical
######      ucxTls: "rc,sm,cuda_ipc,cuda_copy,tcp"
#####      ucxTls: "cuda,rc,sm"
      networkResource: "auto"   # auto-detect from cluster nodes
      networkNr: "1"            # number of network devices

      volumes:
        - name: shared-config
          type: emptyDir
          emptyDir: {}
        - name: dshm
          type: emptyDir
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi

      volumeMounts:
        - name: shared-config
          mountPath: /shared-config
        - name: dshm
          mountPath: /dev/shm

    # -------------------------------------------------------------------------
    # Timeout Configuration
    # -------------------------------------------------------------------------
    timeouts:
      controlWait: 900000
      harnessWait: 900000

    # =========================================================================
    # WORKLOAD / HARNESS -- Benchmark execution configuration
    # =========================================================================

    # -------------------------------------------------------------------------
    # Workload/Harness Configuration
    # -------------------------------------------------------------------------
    workDir: "~/data/pd-disaggregation"

    harness:
      name: vllm-benchmark
      experimentProfile: random_concurrent.yaml
