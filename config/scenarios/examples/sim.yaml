# Sim Example Scenario for LLM-D Deployment
# Based on scenarios/examples/sim.sh
#
# Simulated inference deployment using llm-d-inference-sim.
# No GPUs required. Uses minimal CPU/memory resources.
# Supports both standalone and modelservice deployment methods.

scenario:
  - name: "sim-example"

    model:
      name: facebook/opt-125m
      shortName: facebook-opt-125m
      path: models/facebook/opt-125m
      huggingfaceId: facebook/opt-125m
      gpuMemoryUtilization: 0

    affinity:
      enabled: true
      nodeSelector:
        kubernetes.io/os: linux

    accelerator:
      count: 0

    images:
      vllm:
        repository: ghcr.io/llm-d/llm-d-inference-sim
        tag: v0.7.1

    standalone:
      enabled: false
      replicas: 1

      image:
        repository: ghcr.io/llm-d/llm-d-inference-sim
        tag: latest

      vllm:
        customCommand: |
          /app/llm-d-inference-sim \
            --model facebook/opt-125m \
            --served-model-name facebook/opt-125m \
            --port $VLLM_INFERENCE_PORT \
            --block-size $VLLM_BLOCK_SIZE \
            --max-model-len $VLLM_MAX_MODEL_LEN

    vllmCommon:
      shmMemory: 2Gi

    inferenceExtension:
      monitoring:
        prometheus:
          enabled: false

    infrastructure:
      gateway:
        resources:
          requests:
            cpu: "500m"
            memory: 512Mi
          limits:
            cpu: "2"
            memory: 2Gi

      podMonitor:
        enabled: false

    prefill:
      enabled: false
      replicas: 0

    decode:
      replicas: 2

      parallelism:
        tensor: 1
        data: 1

      accelerator:
        count: 0

      resources:
        limits:
          memory: 4Gi
          cpu: "2"
        requests:
          memory: 4Gi
          cpu: "2"

      vllm:
        modelCommand: imageDefault
        additionalFlags: []

    harness:
      name: inference-perf
      experimentProfile: sanity_random.yaml
      resources:
        cpu: "2"
        memory: 8Gi

    workDir: "~/data/sim"
