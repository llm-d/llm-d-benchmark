name: CI - Nightly Run Benchmark on GKE

on:
  workflow_dispatch:
    inputs:
      input_dir:
        description: 'Input directory for benchmark results'
        required: false
        default: '/tmp/cicd/analysis'
      output_dir:
        description: 'Output directory name (S3 prefix and artifact name)'
        required: false
        default: ''

#  push:
#    branches:
#      - main

  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC

jobs:
  build-image:
    name: Build Nightly Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Build and push nightly image
        uses: ./.github/actions/docker-build-and-push
        with:
          tag: nightly
          image-name: llm-d-benchmark
          registry: ghcr.io/llm-d
          github-token: ${{ secrets.GHCR_TOKEN }}
          platform: linux/amd64

# --------------------------------- METHOD: FMA ---------------------------------
  benchmark-fma:
    name: Benchmark - FMA (GKE)
    runs-on: ubuntu-latest
    needs: [build-image, benchmark-standalone]
    timeout-minutes: 240

    env:
      LLMDBENCH_CICD_NS: llmdbenchcicdfns-gke
      LLMDBENCH_CICD_R: llmdbenchcicdr-gke
      LLMDBENCH_CICD_TARGET: cicd/gke
      LLMDBENCH_CICD_METHOD: fma
      LLMDBENCH_WORKSPACE: /tmp/llmdbenchcicdf-gke
      GCP_PROJECT_ID: llm-d-scale
      GKE_CLUSTER_NAME: llm-d-e2e-us-east5
      GKE_CLUSTER_ZONE: us-east5
      GATEWAY: gke-l7-regional-external-managed
      GATEWAY_TYPE: gke
      LLMDBENCH_HF_TOKEN: ${{ secrets.LLMDBENCH_HF_TOKEN }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093
        with:
          credentials_json: ${{ secrets.GKE_SA_KEY }}

      - name: Set up gcloud CLI and kubectl
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          install_components: 'kubectl,gke-gcloud-auth-plugin'

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials "${{ env.GKE_CLUSTER_NAME }}" --zone "${{ env.GKE_CLUSTER_ZONE }}"
        shell: bash

      - name: Install llmdbenchmark
        run: |
          ./install.sh -y 2>&1
          cp util/debug_info_on_failure.sh /usr/local/bin
        shell: bash

      - name: Cleanup target cloud
        run: |
            llmdbenchmark --spec "$LLMDBENCH_CICD_TARGET" teardown -p "$LLMDBENCH_CICD_NS" -r "$LLMDBENCH_CICD_R" -t "$LLMDBENCH_CICD_METHOD"
            kubectl -n "$LLMDBENCH_CICD_NS" exec -it access-to-harness-data-workload-pvc -- bash -c "rm -rf /requests/*"
        shell: bash

      - name: Standup
        run: |
          llmdbenchmark --spec "$LLMDBENCH_CICD_TARGET" standup --no-monitoring -p "$LLMDBENCH_CICD_NS" -r "$LLMDBENCH_CICD_R" -t "$LLMDBENCH_CICD_METHOD"
        shell: bash

      - name: Debug info (on failure)
        if: failure()
        run: |
          /usr/local/bin/debug_info_on_failure.sh "$LLMDBENCH_CICD_NS"
        shell: bash

      - name: Run
        run: |
          llmdbenchmark --spec "$LLMDBENCH_CICD_TARGET" run -p "$LLMDBENCH_CICD_NS" -t "$LLMDBENCH_CICD_METHOD"
        shell: bash

      - name: Teardown
        if: always()
        run: |
          llmdbenchmark --spec "$LLMDBENCH_CICD_TARGET" teardown -p "$LLMDBENCH_CICD_NS" -r "$LLMDBENCH_CICD_R" -t "$LLMDBENCH_CICD_METHOD"
          kubectl -n "$LLMDBENCH_CICD_NS" exec -it access-to-harness-data-workload-pvc -- bash -c "rm -rf /requests/*"
        shell: bash

      - name: Debug info (on failure)
        if: failure()
        run: |
          /usr/local/bin/debug_info_on_failure.sh "$LLMDBENCH_CICD_NS"
        shell: bash

      - name: Upload results to GCS
        run: |
          REG_PROVIDER=$(basename "$LLMDBENCH_CICD_TARGET")
          REG_METHOD=$LLMDBENCH_CICD_METHOD
          RUN_DATE=$(date +'%Y-%m-%d')
          cd "$LLMDBENCH_WORKSPACE" && gcloud storage cp -r . "gs://llm-d-benchmarks/comparison/$REG_PROVIDER/$REG_METHOD/$RUN_DATE" || true
        shell: bash

#     START - This should be deleted, and the contents accessed from GCS accessed directly
      - name: Download standalone results
        if: always()
        uses: actions/download-artifact@v8
        with:
          name: benchmark-results-gke-standalone
          path: /tmp/standalone-results
        continue-on-error: true

      - name: Display benchmark results
        if: always()
        run: |
          echo "## Benchmark Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          found=0
          for f in $(find "$LLMDBENCH_WORKSPACE" /tmp/standalone-results -path "*/analysis/*" \( -name "result.txt" -o -name "summary.txt" \) 2>/dev/null | sort || true); do
            found=1
            stack_dir=$(basename "$(dirname "$f")")
            echo "### $stack_dir" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat "$f" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          done
          if [ "$found" -eq 0 ]; then
            echo "_No analysis results found._" >> "$GITHUB_STEP_SUMMARY"
          fi
        shell: bash

      - name: Archive benchmark results as GitHub artifact
        if: success() || failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: benchmark-results-gke-fma
          path: ${{ env.LLMDBENCH_WORKSPACE }}
          retention-days: 14
#     END - This should be deleted, and the contents accessed from GCS accessed directly

