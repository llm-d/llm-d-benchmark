name: CI - Nightly Run Benchmark on OCP ("Standalone" standup method)

on:
  workflow_dispatch:
    inputs:
      scenario_dir:
        description: 'Directory housing the scenarios'
        required: false
        default: 'cicd'
      standup_method:
        description: 'Standup method to be used ("standalone","fma","modelservice")'
        required: false
        default: 'standalone'
      cluster_provider:
        description: 'Cluster provider targeted ("ocp","gke","cks")'
        required: false
        default: 'ocp'
      cluster_namespace:
        description: 'Cluster namespace'
        required: false
        default: 'llmdbenchcicdsns-ocp'
      helm_release:
        description: 'Helm release name (for modelservice)'
        required: false
        default: 'lmdbenchcicdr-ocp'
      workspace_dir:
        description: 'Workspace directory'
        required: false
        default: '/tmp/llmdbenchcicds-ocp'
      bucket_project:
        description: 'Project associated to the object storage bucket'
        required: false
        default: 'llm-d-scale'
      bucket_provider:
        description: 'Type (provider of) the bucket'
        required: false
        default: 'gcs'
      bucket_path:
        description: 'Path to object storage bucket'
        required: false
        default: 'llm-d-benchmarks/regressions'
      gateway_class:
        description: 'Class of gateway used ("istio", "agentgateway", "epponly", "none")'
        required: false
        default: 'istio'
      monitoring_enabled:
        description: 'Enabled monitoring ("true", "false")'
        required: true
        type: 'string'
        default: 'true'
      dry_run:
        description: 'Execute workflow in "dry-run" mode ("true", "false")'
        required: false
        default: 'false'
      verbose:
        description: 'Execute workflow in "verbose" mode ("true", "false")'
        required: false
        default: 'false'
        type: 'string'

#  push:
#    branches:
#      - main

  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC

jobs:
  nightly:
    uses: llm-d/llm-d-benchmark/.github/workflows/reusable-ci-nightly-benchmark.yaml@main
    with:
      scenario_dir: ${{ inputs.scenario_dir }}
      standup_method: ${{ inputs.standup_method }}
      cluster_provider: ${{ inputs.cluster_provider }}
      cluster_namespace: ${{ inputs.cluster_namespace }}
      helm_release: ${{ inputs.helm_release }}
      workspace_dir: ${{ inputs.workspace_dir }}
      bucket_project: ${{ inputs.bucket_project }}
      bucket_provider: ${{ inputs.bucket_provider }}
      bucket_path: ${{ inputs.bucket_path }}
      gateway_class: ${{ inputs.gateway_class }}
      monitoring_enabled: ${{ inputs.monitoring_enabled }}
      dry_run: ${{ inputs.dry_run }}
      verbose: ${{ inputs.verbose }}
    secrets: inherit