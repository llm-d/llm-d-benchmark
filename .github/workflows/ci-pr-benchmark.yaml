name: CI - PR Benchmark Run

on:
  pull_request:

jobs:
  benchmark-kind-sim:
    name: Inference Simulation Benchmark (Kind)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      NS: llmdbenchcicd-${{ github.event.number }}
      HF_TOKEN: "ci-placeholder"
      LLMDBENCH_WORKSPACE: /tmp/cicd-${{ github.event.number }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Display OS
        run: cat /etc/*os-*

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install helmfile
        run: |
          HELMFILE_VERSION=$(curl -sL https://api.github.com/repos/helmfile/helmfile/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          curl -sSL -o helmfile.tar.gz "https://github.com/helmfile/helmfile/releases/download/${HELMFILE_VERSION}/helmfile_${HELMFILE_VERSION#v}_linux_amd64.tar.gz"
          tar xzf helmfile.tar.gz
          sudo mv helmfile /usr/local/bin/
          rm -f helmfile.tar.gz

      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          version: v0.31.0

      - name: Label node for simulated accelerators
        run: |
          NODE=$(kubectl get nodes -o jsonpath='{.items[0].metadata.name}')
          echo "Labeling node: $NODE"
          kubectl label node "$NODE" kubernetes.io/os=linux --overwrite

      - name: Install llmdbenchmark
        run: |
          ./install.sh -y
          pip install pytest

      # -- Unit tests --
      - name: Run unit tests
        run: python -m pytest tests/ -x -q

      # -- Standalone deployment --
      - name: Standup (standalone) -- inference-sim
        run: |
          llmdbenchmark --spec cicd/kind-sim standup -p "$NS" -t standalone --skip-smoketest

      - name: Smoketest (standalone)
        run: |
          llmdbenchmark --spec cicd/kind-sim smoketest -p "$NS" -t standalone || true

      - name: Run harness (standalone, dry-run)
        run: |
          llmdbenchmark --spec cicd/kind-sim --dry-run run -p "$NS" -t standalone \
            -l inference-perf -w sanity_random.yaml

      - name: Teardown (standalone)
        if: always()
        run: |
          llmdbenchmark --spec cicd/kind-sim teardown -p "$NS" -t standalone || true

      # -- Modelservice deployment --
      - name: Standup (modelservice) -- inference-sim
        run: |
          llmdbenchmark --spec cicd/kind-sim standup -p "$NS" --skip-smoketest

      - name: Smoketest (modelservice)
        run: |
          llmdbenchmark --spec cicd/kind-sim smoketest -p "$NS" || true

      - name: Run harness (modelservice, dry-run)
        run: |
          llmdbenchmark --spec cicd/kind-sim --dry-run run -p "$NS" \
            -l inference-perf -w sanity_random.yaml

      - name: Teardown (modelservice)
        if: always()
        run: |
          llmdbenchmark --spec cicd/kind-sim teardown -p "$NS" || true

      # -- Debug on failure --
      - name: Debug info (on failure)
        if: failure()
        run: |
          echo "=== Pod status ==="
          kubectl get pods -n "$NS" -o wide || true
          echo ""
          echo "=== Pod descriptions (non-running) ==="
          for pod in $(kubectl get pods -n "$NS" --field-selector=status.phase!=Running,status.phase!=Succeeded -o name 2>/dev/null); do
            echo "--- $pod ---"
            kubectl describe -n "$NS" "$pod" || true
          done
          echo ""
          echo "=== Pod logs (non-running) ==="
          for pod in $(kubectl get pods -n "$NS" --field-selector=status.phase!=Running,status.phase!=Succeeded -o name 2>/dev/null); do
            echo "--- $pod ---"
            kubectl logs -n "$NS" "$pod" --tail=200 --all-containers || true
          done
          echo ""
          echo "=== Events ==="
          kubectl get events -n "$NS" --sort-by='.lastTimestamp' | tail -30 || true
