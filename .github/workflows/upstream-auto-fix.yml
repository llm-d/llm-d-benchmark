name: Upstream Auto-Fix
# When the upstream-monitor creates an issue about a new dependency release,
# this workflow assigns Copilot SWE agent to automatically create a PR.
# Pattern borrowed from kubestellar/console auto-qa workflow.

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  assign-copilot:
    runs-on: ubuntu-latest
    if: >-
      (contains(github.event.issue.labels.*.name, 'upstream-breaking-change') ||
       contains(github.event.issue.labels.*.name, 'upstream-update')) &&
      !contains(github.event.issue.labels.*.name, 'auto-fix')
    steps:
      - name: Check for existing PR
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            // Skip if Copilot is already assigned
            const assignees = context.payload.issue.assignees.map(a => a.login);
            if (assignees.includes('copilot-swe-agent[bot]')) {
              core.info('Copilot already assigned, skipping');
              core.setOutput('skip', 'true');
              return;
            }

            // Skip if a PR already references this issue
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const linked = prs.find(pr =>
              pr.body && pr.body.includes(`#${context.payload.issue.number}`)
            );
            if (linked) {
              core.info(`PR #${linked.number} already references this issue, skipping`);
              core.setOutput('skip', 'true');
              return;
            }

            core.setOutput('skip', 'false');

      - name: Add instructions and assign Copilot
        if: steps.check.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const repo = `${context.repo.owner}/${context.repo.repo}`;

            // Post update instructions for Copilot
            const instructions = [
              '## 🤖 Auto-Fix Instructions\n',
              'Copilot, please update the version pin for the dependency described in this issue.\n',
              '### Steps',
              '1. Read `docs/upstream-versions.md` to find the dependency row, its **File Location**, and **Pin Type**',
              '2. Parse the issue title to get the dependency name, old version, and new version',
              '3. If the current pin is `auto`, `latest`, `stable`, or `unpinned` (floating pin type), comment that no change is needed and stop',
              '4. Update the version in the source file mentioned in the File Location column',
              '5. Update the Current Pin value in `docs/upstream-versions.md`',
              '6. Validate modified shell scripts with `bash -n`\n',
              '### PR Format',
              '- **Title**: `⬆️ Bump {dependency} from {old_version} to {new_version}`',
              '- **Body**: Reference this issue with `Closes #' + issue.number + '`',
              '- **Keep changes minimal** — only update the version pins',
              '- **Sign commits** with DCO (`git commit -s`)',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: instructions,
            });
            core.info(`Posted instructions on #${issue.number}`);

            // Assign Copilot SWE agent (same pattern as kubestellar/console auto-qa)
            try {
              await github.request('POST /repos/{owner}/{repo}/issues/{issue_number}/assignees', {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                assignees: ['copilot-swe-agent[bot]'],
                agent_assignment: {
                  target_repo: repo,
                  base_branch: 'main',
                },
              });
              core.info(`Assigned Copilot to #${issue.number}`);
            } catch (e) {
              core.warning(`Could not assign Copilot to #${issue.number}: ${e.message}`);
              // Add label so maintainers know manual action is needed
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['help wanted'],
              });
            }
