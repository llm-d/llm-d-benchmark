name: CI - Config Explorer Test

on:
  pull_request:

jobs:

  run-config-explorer:
    name: Usability Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Display Python version
        run: python -c "import sys; print(sys.version)"

      - name: Install llmdbenchmark and config_explorer
        run: ./install.sh -y

      - name: Verify packages installed
        run: |
          pip list | grep -E "llmdbenchmark|config"
          llmdbenchmark --version

      - name: Package functionality check
        shell: bash
        env:
          MODEL: "Qwen/Qwen3-0.6B"
        run: |
          cat <<EOF > ~/test.py
          import os
          from config_explorer.capacity_planner import *
          model = os.environ.get("MODEL")
          info = get_model_info_from_hf(model)
          print(info)

          config = get_model_config_from_hf(model)
          print(config)
          EOF
          python ~/test.py

      - name: Create Kind cluster
        uses: helm/kind-action@v1

      - name: Patch node with dummy GPU label
        shell: bash
        run: |
          kubectl patch node $(kubectl get nodes -o name | cut -d'/' -f2) -p '{"metadata":{"labels":{"nvidia.com/gpu.product":"NVIDIA-H100-80GB-HBM3"}}}'
          kubectl get nodes --show-labels

      - name: llm-d-benchmark integration check (plan + partial standup)
        shell: bash
        run: |
          # Run plan rendering and first few standup steps (infra check,
          # admin prerequisites, cluster validation) to verify the
          # declarative pipeline works end-to-end with config_explorer.
          llmdbenchmark --spec guides/inference-scheduling standup \
            -p llmdbenchcicd \
            -m "Qwen/Qwen3-0.6B" \
            -s 0,2,3 \
            --skip-smoketest
