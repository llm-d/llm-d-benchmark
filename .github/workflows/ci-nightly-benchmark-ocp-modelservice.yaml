name: CI - Nightly Run Benchmark on OCP ("Modelservice" standup method)

on:
  workflow_dispatch:
    inputs:
      scenario_dir:
        description: 'Directory housing the scenarios'
        required: false
        default: 'cicd'
      standup_method:
        description: 'Standup method to be used ("standalone","fma","modelservice")'
        required: false
        default: 'modelservice'
      cluster_provider:
        description: 'Cluster provider targeted ("ocp","gke","cks")'
        required: false
        default: 'ocp'
      cluster_namespace:
        description: 'Cluster namespace'
        required: false
        default: 'llmdbenchcicdmns-ocp'
      helm_release:
        description: 'Helm release name (for modelservice)'
        required: false
        default: 'lmdbenchcicdr-ocp'
      workspace_dir:
        description: 'Workspace directory'
        required: false
        default: '/tmp/llmdbenchcicdm-ocp'
      bucket_project:
        description: 'Project associated to the object storage bucket'
        required: false
        default: 'llm-d-scale'
      bucket_provider:
        description: 'Type (provider of) the bucket'
        required: false
        default: 'gcs'
      bucket_path:
        description: 'Path to object storage bucket'
        required: false
        default: 'llm-d-benchmarks/regressions'
      gateway_class:
        description: 'Class of gateway used ("istio", "agentgateway", "epponly", "none")'
        required: false
        default: 'istio'
      monitoring_enabled:
        description: 'Enabled monitoring ("true", "false")'
        required: true
        type: 'string'
        default: 'true'
      dry_run:
        description: 'Execute workflow in "dry-run" mode ("true", "false")'
        required: false
        default: 'false'
      verbose:
        description: 'Execute workflow in "verbose" mode ("true", "false")'
        required: false
        default: 'false'
        type: 'string'
      harness:
        description: 'Harness to be used during "run" operation ("inference-perf", "guidellm", "inferencemax", "vllm-benchmark", "nop")'
        required: false
        default: 'vllm-benchmark'
        type: 'string'
      workload:
        description: 'Workload profile to be used during "run" operation (check list under "workload/profiles")'
        required: false
        default: 'sanity_random.yaml'
        type: 'string'
#  push:
#    branches:
#      - main

  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC

jobs:
  nightly:
    uses: llm-d/llm-d-infra/.github/workflows/reusable-ci-nightly-benchmark.yaml@main
    with:
      scenario_dir: ${{ inputs.scenario_dir || 'cicd' }}
      standup_method: ${{ inputs.standup_method || 'modelservice' }}
      cluster_provider: ${{ inputs.cluster_provider || 'ocp' }}
      cluster_namespace: ${{ inputs.cluster_namespace || 'llmdbenchcicdmns-ocp' }}
      helm_release: ${{ inputs.helm_release || 'lmdbenchcicdr-ocp' }}
      workspace_dir: ${{ inputs.workspace_dir || '/tmp/llmdbenchcicdm-ocp' }}
      bucket_project: ${{ inputs.bucket_project || 'llm-d-scale' }}
      bucket_provider: ${{ inputs.bucket_provider || 'gcs' }}
      bucket_path: ${{ inputs.bucket_path || 'llm-d-benchmarks/regressions' }}
      gateway_class: ${{ inputs.gateway_class || 'istio' }}
      monitoring_enabled: ${{ inputs.monitoring_enabled || 'true' }}
      dry_run: ${{ inputs.dry_run || 'false' }}
      verbose: ${{ inputs.verbose || 'false' }}
      harness: ${{ inputs.harness || 'vllm-benchmark' }}
      workload: ${{ inputs.workload || 'sanity_random.yaml' }}
    secrets: inherit

