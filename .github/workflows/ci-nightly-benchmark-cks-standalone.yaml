name: CI - Nightly Run Benchmark on CKS ("Standalone" standup method)

on:
  workflow_dispatch:
    inputs:
      scenario_dir:
        description: 'Directory housing the scenarios'
        required: false
        default: 'cicd'
      standup_method:
        description: 'Standup method to be used ("standalone","fma","modelservice")'
        required: false
        default: 'standalone'
      cluster_provider:
        description: 'Cluster provider targeted ("ocp","gke","cks")'
        required: false
        default: 'cks'
      cluster_namespace:
        description: 'Cluster namespace'
        required: false
        default: 'llmdbenchcicdsns-cks'
      helm_release:
        description: 'Helm release name (for modelservice)'
        required: false
        default: 'llmdbenchcicdr-cks'
      workspace_dir:
        description: 'Workspace directory'
        required: false
        default: '/tmp/llmdbenchcicds-cks'
      bucket_project:
        description: 'Project associated to the object storage bucket'
        required: false
        default: 'llm-d-scale'
      bucket_provider:
        description: 'Type (provider of) the bucket'
        required: false
        default: 'gcs'
      bucket_path:
        description: 'Path to object storage bucket'
        required: false
        default: 'llm-d-benchmarks/regressions'
      gateway_class:
        description: 'Class of gateway used ("istio", "agentgateway", "epponly", "none")'
        required: false
        default: 'istio'
      dry_run:
        description: 'Execute workflow in "dry-run" mode ("true", "false")'
        required: false
        default: 'false'
      verbose:
        description: 'Execute workflow in "verbose" mode ("true", "false")'
        required: false
        default: 'false'

#  push:
#    branches:
#      - main

  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC

jobs:
  nightly:
    uses: llm-d/llm-d-benchmark/.github/workflows/reusable-ci-nightly-benchmark.yaml@main