name: CI - Nightly Run Benchmark on GKE ("Modelservice" standup method)

on:
  workflow_dispatch:
    inputs:
      scenario_dir:
        description: 'Directory housing the scenarios'
        required: false
        default: 'cicd'
      standup_method:
        description: 'Standup method to be used ("standalone","fma","modelservice")'
        required: false
        default: 'modelservice'
      standup_scenario:
        description: 'Cluster provider targeted ("ocp","gke","cks")'
        required: false
        type: 'string'
        default: 'gke'
      decode_pods:
        description: 'Number of decode (vllm "standalone") pods (default "auto", means what was configured on the scenario)'
        required: false
        type: 'string'
        default: 'auto'
      prefill_pods:
        description: 'Number of prefill pods (default "auto", means what was configured on the scenario)'
        required: false
        type: 'string'
        default: 'auto'
      accelerator_type:
        description: 'Type of accelerator (gpu, cpu, sim, amd, xpu, hpu, tpu-v6, tpu-v7)'
        required: false
        type: 'string'
        default: 'gpu'
      backend_type:
        description: 'Type of backend (vllm, sglang)'
        required: false
        type: 'string'
        default: 'vllm'
      cluster_namespace:
        description: 'Cluster namespace'
        required: false
        default: 'llmdbenchcicdmns-gke'
      helm_release:
        description: 'Helm release name (for modelservice)'
        required: false
        default: 'llmdbenchcicdr-gke'
      workspace_dir:
        description: 'Workspace directory'
        required: false
        default: '/tmp/llmdbenchcicdm-gke'
      bucket_project:
        description: 'Project associated to the object storage bucket'
        required: false
        default: 'llm-d-scale'
      bucket_provider:
        description: 'Type (provider of) the bucket'
        required: false
        default: 'gcs'
      bucket_path:
        description: 'Path to object storage bucket'
        required: false
        default: 'llm-d-benchmarks/regressions'
      gateway_class:
        description: 'Class of gateway used ("istio", "agentgateway", "epponly", "none")'
        required: false
        default: 'epponly'
      monitoring_enabled:
        description: 'Enabled monitoring ("true", "false")'
        required: true
        type: 'string'
        default: 'false'
      dry_run:
        description: 'Execute workflow in "dry-run" mode ("true", "false")'
        required: false
        default: 'false'
      verbose:
        description: 'Execute workflow in "verbose" mode ("true", "false")'
        required: false
        default: 'false'
        type: 'string'
      harness:
        description: 'Harness to be used during "run" operation ("inference-perf", "guidellm", "inferencemax", "vllm-benchmark", "nop")'
        required: false
        default: 'guidellm'
        type: 'string'
      workload:
        description: 'Workload profile to be used during "run" operation (check list under "workload/profiles")'
        required: false
        default: 'sanity_random.yaml'
        type: 'string'

#  push:
#    branches:
#      - main

  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC

jobs:
  nightly:
    uses: llm-d/llm-d-infra/.github/workflows/reusable-ci-nightly-benchmark.yaml@main
    with:
      scenario_dir: ${{ inputs.scenario_dir || 'cicd' }}
      standup_method: ${{ inputs.standup_method || 'modelservice' }}
      standup_scenario: ${{ inputs.standup_scenario || 'gke' }}
      decode_pods: ${{ inputs.decode_pods || 'auto' }}
      prefill_pods: ${{ inputs.prefill_pods || 'auto' }}
      accelerator_type: ${{ inputs.accelerator_type || 'gpu' }}
      backend_type: ${{ inputs.backend_type || 'vllm' }}
      cluster_namespace: ${{ inputs.cluster_namespace || 'llmdbenchcicdmns-gke' }}
      helm_release: ${{ inputs.helm_release || 'llmdbenchcicdr-gke' }}
      workspace_dir: ${{ inputs.workspace_dir || '/tmp/llmdbenchcicdm-gke' }}
      bucket_project: ${{ inputs.bucket_project || 'llm-d-scale' }}
      bucket_provider: ${{ inputs.bucket_provider || 'gcs' }}
      bucket_path: ${{ inputs.bucket_path || 'llm-d-benchmarks/regressions' }}
      gateway_class: ${{ inputs.gateway_class || 'epponly' }}
      monitoring_enabled: ${{ inputs.monitoring_enabled || 'false' }}
      dry_run: ${{ inputs.dry_run || 'false' }}
      verbose: ${{ inputs.verbose || 'false' }}
      harness: ${{ inputs.harness || 'guidellm' }}
      workload: ${{ inputs.workload || 'sanity_random.yaml' }}
    secrets: inherit
