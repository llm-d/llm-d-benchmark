name: CI - Nightly Run Benchmark on GKE ("Modelservice" standup method)

on:
  workflow_dispatch:
    inputs:
      input_dir:
        description: 'Input directory for benchmark results'
        required: false
        default: '/tmp/cicd/analysis'
      output_dir:
        description: 'Output directory name (S3 prefix and artifact name)'
        required: false
        default: ''

#  push:
#    branches:
#      - main

  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC

jobs:
  ensure-nightly-build-image:
    name: Ensure Nightly Build  Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo yq

      - name: Ensure image is already built
        run: |
          IMAGE="ghcr.io/llm-d/llm-d-benchmark:nightly"
          POLL=30
          while true; do
            creation_date=$(skopeo inspect docker://${IMAGE} | yq -r .Created) && \
            creation_ts=$(date -d "${creation_date}" +"%s")
            current_ts=$(date +%s) && \
            image_age=$((current_ts - creation_ts))
            if [[ $image_age -gt 86400 ]]; then
              echo "Current image \"${IMAGE}\" is too old (${image_age}s). Waiting $POLL seconds and trying again..."
              sleep $POLL
            else
              echo "Current image \"${IMAGE}\" is recent enough (${image_age}s)."
              exit 0
            fi
          done
        shell: bash

  benchmark-gke-modelservice:
    name: Benchmark - ModelService (GKE)
    runs-on: ubuntu-latest
    needs: [ensure-nightly-build-image]
    timeout-minutes: 240

    env:
      LLMDBENCH_CICD_NS: llmdbenchcicdmns-gke
      LLMDBENCH_CICD_R: llmdbenchcicdr-gke
      LLMDBENCH_CICD_SCENARIO_DIR: cicd
      LLMDBENCH_CICD_TARGET: gke
      LLMDBENCH_CICD_METHOD: modelservice
      LLMDBENCH_WORKSPACE: /tmp/llmdbenchcicdm-gke
      GCS_PATH: llm-d-benchmarks/regressions
      GCP_PROJECT_ID: llm-d-scale
      GKE_CLUSTER_NAME: llm-d-e2e-us-east5
      GKE_CLUSTER_ZONE: us-east5
      GATEWAY: gke-l7-regional-external-managed
      GATEWAY_TYPE: gke
      LLMDBENCH_HF_TOKEN: ${{ secrets.LLMDBENCH_HF_TOKEN }}
      USE_GKE_GCLOUD_AUTH_PLUGIN: "True"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093
        with:
          credentials_json: ${{ secrets.GKE_SA_KEY }}

      - name: Set up gcloud CLI and kubectl
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          install_components: 'kubectl,gke-gcloud-auth-plugin'

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials "${{ env.GKE_CLUSTER_NAME }}" --zone "${{ env.GKE_CLUSTER_ZONE }}"
        shell: bash

      - name: Install llmdbenchmark
        run: |
          ./install.sh -y 2>&1
          cp util/debug_info_on_failure.sh /usr/local/bin
        shell: bash

      - name: Cleanup target cloud
        run: |
          RUN_DATE=$(date +'%Y-%m-%d')
          llmdbenchmark --spec "$LLMDBENCH_CICD_SCENARIO_DIR/$LLMDBENCH_CICD_TARGET" teardown -p "$LLMDBENCH_CICD_NS" -r "$LLMDBENCH_CICD_R" -t "$LLMDBENCH_CICD_METHOD"
          kubectl -n "$LLMDBENCH_CICD_NS" exec -i access-to-harness-data-workload-pvc -- bash -c "rm -rf /requests/*" || true
        shell: bash

      - name: Standup
        run: |
          llmdbenchmark --spec "$LLMDBENCH_CICD_SCENARIO_DIR/$LLMDBENCH_CICD_TARGET" standup --no-monitoring -p "$LLMDBENCH_CICD_NS" -r "$LLMDBENCH_CICD_R" -t "$LLMDBENCH_CICD_METHOD"
        shell: bash

      - name: Debug info (on failure)
        if: failure()
        run: |
          /usr/local/bin/debug_info_on_failure.sh "$LLMDBENCH_CICD_NS"
        shell: bash

      - name: Run
        run: |
          llmdbenchmark --spec "$LLMDBENCH_CICD_SCENARIO_DIR/$LLMDBENCH_CICD_TARGET" run -p "$LLMDBENCH_CICD_NS" -t "$LLMDBENCH_CICD_METHOD"
        shell: bash

      - name: Teardown
        if: always()
        run: |
          llmdbenchmark --spec "$LLMDBENCH_CICD_SCENARIO_DIR/$LLMDBENCH_CICD_TARGET" teardown -p "$LLMDBENCH_CICD_NS" -r "$LLMDBENCH_CICD_R" -t "$LLMDBENCH_CICD_METHOD"
          kubectl -n "$LLMDBENCH_CICD_NS" exec -i access-to-harness-data-workload-pvc -- bash -c "rm -rf /requests/*" || true
        shell: bash

      - name: Debug info (on failure)
        if: failure()
        run: |
          /usr/local/bin/debug_info_on_failure.sh "$LLMDBENCH_CICD_NS"
        shell: bash

      - name: Upload results to GCS
        run: |
          RUN_DATE=$(date +'%Y-%m-%d')
          cd "$LLMDBENCH_WORKSPACE"
          REG_RESULTS=$(find . -name results | sed "s^/results$^^g" | cut -d '/' -f 2)
          gcloud storage cp -r $REG_RESULTS/ "gs://${GCS_PATH}/$LLMDBENCH_CICD_TARGET/$LLMDBENCH_CICD_METHOD/$RUN_DATE/" || true
        shell: bash
