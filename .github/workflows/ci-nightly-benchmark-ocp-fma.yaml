name: CI - Nightly Run Benchmark on OCP ("FMA" standup method)

on:
  workflow_dispatch:
    inputs:
      scenario_dir:
        description: 'Directory housing the scenarios'
        required: false
        default: 'cicd'
      standup_method:
        description: 'Standup method to be used ("standalone","fma","modelservice")'
        required: false
        default: 'fma'
      standup_scenario:
        description: 'Cluster provider targeted ("ocp","gke","cks")'
        required: false
        type: 'string'
        default: 'ocp'
      decode_pods:
        description: 'Number of decode (vllm "standalone") pods (default "auto", means what was configured on the scenario)'
        required: false
        type: 'string'
        default: 'auto'
      prefill_pods:
        description: 'Number of prefill pods (default "auto", means what was configured on the scenario)'
        required: false
        type: 'string'
        default: 'auto'
      accelerator_type:
        description: 'Type of accelerator (gpu, cpu, sim, amd, xpu, hpu, tpu-v6, tpu-v7) (ONLY VALID FOR "kustomize" standyp method)'
        required: false
        type: 'string'
        default: 'gpu'
      backend_type:
        description: 'Type of backend (vllm, sglang) (ONLY VALID FOR "kustomize" standyp method)'
        required: false
        type: 'string'
        default: 'vllm'
      infra_provider:
        description: 'Target cloud provider (ONLY VALID FOR "kustomize" standyp method)'
        required: false
        type: 'string'
        default: 'base'
      connector:
        description: 'Accelerator offloading connector (ONLY VALID FOR "kustomize" standyp method)'
        required: false
        type: 'string'
        default: ''
      cluster_namespace:
        description: 'Cluster namespace'
        required: false
        default: 'llmdbenchcicdfns-ocp'
      helm_release:
        description: 'Helm release name (for modelservice)'
        required: false
        default: 'lmdbenchcicdr-ocp'
      workspace_dir:
        description: 'Workspace directory'
        required: false
        default: '/tmp/llmdbenchcicdf-ocp'
      bucket_project:
        description: 'Project associated to the object storage bucket'
        required: false
        default: 'llm-d-scale'
      bucket_provider:
        description: 'Type (provider of) the bucket'
        required: false
        default: 'gcs'
      bucket_path:
        description: 'Path to object storage bucket'
        required: false
        default: 'llm-d-benchmarks/regressions'
      gateway_class:
        description: 'Class of gateway used ("istio", "agentgateway", "epponly", "none")'
        required: false
        default: 'none'
      monitoring_enabled:
        description: 'Enabled monitoring ("true", "false")'
        required: true
        type: 'string'
        default: 'true'
      dry_run:
        description: 'Execute workflow in "dry-run" mode ("true", "false")'
        required: false
        default: 'false'
      verbose:
        description: 'Execute workflow in "verbose" mode ("true", "false")'
        required: false
        default: 'false'
        type: 'string'
      harness:
        description: 'Harness to be used during "run" operation ("inference-perf", "guidellm", "inferencemax", "vllm-benchmark", "nop")'
        required: false
        default: 'nop'
        type: 'string'
      workload:
        description: 'Workload profile to be used during "run" operation (check list under "workload/profiles")'
        required: false
        default: 'nop.yaml'
        type: 'string'
#  push:
#    branches:
#      - main

  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC

jobs:
  nightly:
    uses: llm-d/llm-d-infra/.github/workflows/reusable-ci-nightly-benchmark.yaml@main
    with:
      scenario_dir: ${{ inputs.scenario_dir || 'cicd' }}
      standup_method: ${{ inputs.standup_method || 'fma' }}
      standup_scenario: ${{ inputs.standup_scenario || 'ocp' }}
      decode_pods: ${{ inputs.decode_pods || 'auto' }}
      prefill_pods: ${{ inputs.prefill_pods || 'auto' }}
      accelerator_type: ${{ inputs.accelerator_type || 'gpu' }}
      backend_type: ${{ inputs.backend_type || 'vllm' }}
      infra_provider: ${{ inputs.infra_provider || 'ocp' }}
      connector: ${{ inputs.infra_provider || '' }}
      cluster_namespace: ${{ inputs.cluster_namespace || 'llmdbenchcicdfns-ocp' }}
      helm_release: ${{ inputs.helm_release || 'lmdbenchcicdr-ocp' }}
      workspace_dir: ${{ inputs.workspace_dir || '/tmp/llmdbenchcicdf-ocp' }}
      bucket_project: ${{ inputs.bucket_project || 'llm-d-scale' }}
      bucket_provider: ${{ inputs.bucket_provider || 'gcs' }}
      bucket_path: ${{ inputs.bucket_path || 'llm-d-benchmarks/regressions' }}
      gateway_class: ${{ inputs.gateway_class || 'none' }}
      monitoring_enabled: ${{ inputs.monitoring_enabled || 'true' }}
      dry_run: ${{ inputs.dry_run || 'false' }}
      verbose: ${{ inputs.verbose || 'false' }}
      harness: ${{ inputs.harness || 'nop' }}
      workload: ${{ inputs.workload || 'nop.yaml' }}
    secrets: inherit

