name: CI - Nightly Run Benchmark on OCP

on:
  workflow_dispatch:
    inputs:
      input_dir:
        description: 'Input directory for benchmark results'
        required: false
        default: '/tmp/cicd/analysis'
      output_dir:
        description: 'Output directory name (S3 prefix and artifact name)'
        required: false
        default: ''

#  push:
#    branches:
#      - main

  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC

jobs:
  build-image:
    name: Build Nightly Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Build and push nightly image
        uses: ./.github/actions/docker-build-and-push
        with:
          tag: nightly
          image-name: llm-d-benchmark
          registry: ghcr.io/llm-d
          github-token: ${{ secrets.GHCR_TOKEN }}
          platform: linux/amd64

# --------------------------------- METHOD: FMA ---------------------------------

  benchmark-fma:
    name: Benchmark - FMA (OCP)
    runs-on: [self-hosted, openshift, pok-prod]
    needs: [build-image, benchmark-standalone]
    timeout-minutes: 240

    env:
      LLMDBENCH_CICD_NS: llmdbenchcicdfns-ocp
      LLMDBENCH_CICD_R: llmdbenchcicdr-ocp
      LLMDBENCH_CICD_TARGET: cicd/ocp
      LLMDBENCH_CICD_METHOD: fma
      LLMDBENCH_WORKSPACE: /tmp/llmdbenchcicdf-ocp
      LLMDBENCH_HF_TOKEN: ${{ secrets.LLMDBENCH_HF_TOKEN }}
      GCP_PROJECT_ID: llm-d-scale

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up kubeconfig from secret
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DATA_OCP }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
        shell: bash

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093
        with:
          credentials_json: ${{ secrets.GKE_SA_KEY }}

      - name: Set up gcloud CLI and kubectl
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          install_components: 'kubectl,gke-gcloud-auth-plugin'

      - name: Install llmdbenchmark
        run: |
          ./install.sh -y 2>&1
          cp util/debug_info_on_failure.sh /usr/local/bin
        shell: bash

      - name: Cleanup target cloud
        run: |
            llmdbenchmark --spec "$LLMDBENCH_CICD_TARGET" teardown -p "$LLMDBENCH_CICD_NS" -r "$LLMDBENCH_CICD_R" -t "$LLMDBENCH_CICD_METHOD"
            kubectl -n "$LLMDBENCH_CICD_NS" exec -i access-to-harness-data-workload-pvc -- bash -c "rm -rf /requests/*" || true
        shell: bash

      - name: Standup
        run: |
          llmdbenchmark --spec "$LLMDBENCH_CICD_TARGET" standup -p "$LLMDBENCH_CICD_NS" -r "$LLMDBENCH_CICD_R" -t "$LLMDBENCH_CICD_METHOD"
        shell: bash

      - name: Debug info (on failure)
        if: failure()
        run: |
          /usr/local/bin/debug_info_on_failure.sh "$LLMDBENCH_CICD_NS"
        shell: bash

      - name: Run
        run: |
          llmdbenchmark --spec "$LLMDBENCH_CICD_TARGET" run -p "$LLMDBENCH_CICD_NS" -t "$LLMDBENCH_CICD_METHOD"
        shell: bash

      - name: Teardown
        if: always()
        run: |
          llmdbenchmark --spec "$LLMDBENCH_CICD_TARGET" teardown -p "$LLMDBENCH_CICD_NS" -r "$LLMDBENCH_CICD_R" -t "$LLMDBENCH_CICD_METHOD"
          kubectl -n "$LLMDBENCH_CICD_NS" exec -i access-to-harness-data-workload-pvc -- bash -c "rm -rf /requests/*" || true
        shell: bash

      - name: Debug info (on failure)
        if: failure()
        run: |
          /usr/local/bin/debug_info_on_failure.sh "$LLMDBENCH_CICD_NS"
        shell: bash

      - name: Upload results to GCS
        run: |
          REG_PROVIDER=$(basename "$LLMDBENCH_CICD_TARGET")
          REG_METHOD=$LLMDBENCH_CICD_METHOD
          RUN_DATE=$(date +'%Y-%m-%d')
          cd "$LLMDBENCH_WORKSPACE"
          REG_RESULTS=$(find . -name results | sed "s^/results$^^g" | cut -d '/' -f 2)
          gcloud storage cp -r $REG_RESULTS/ "gs://llm-d-benchmarks/regressions/$REG_PROVIDER/$REG_METHOD/$RUN_DATE/" || true
        shell: bash

