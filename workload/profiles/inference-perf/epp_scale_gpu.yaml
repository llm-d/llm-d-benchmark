load:
  type: constant
  stages:
  - rate: 10
    duration: 60
  - rate: 50
    duration: 60
  - rate: 100
    duration: 60
  - rate: 200
    duration: 60
  - rate: 500
    duration: 60
api:
  type: completion
  streaming: true
server:
  type: vllm
  model_name: Qwen/Qwen2.5-7B-Instruct
  base_url: http://epp-benchmark-epp:8081
  ignore_eos: true
tokenizer:
  pretrained_model_name_or_path: Qwen/Qwen2.5-7B-Instruct
data:
  type: synthetic
  input_distribution:
    min: 50
    mean: 125
    max: 200
  output_distribution:
    min: 10
    mean: 30
    max: 50
report:
  request_lifecycle:
    summary: true
    per_stage: true
    per_request: false
